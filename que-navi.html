const { useState, useEffect, useCallback, useRef } = React;

/* ══════════════════════════════════════
   定数・カラー
══════════════════════════════════════ */
const SVC = {
  ubereats: { label:"Uber Eats",   icon:"🐸", color:"#22c55e", dark:"#031a07" },
  rocket:   { label:"ロケットナウ", icon:"🚀", color:"#ff6b35", dark:"#1a0a03" },
  demae:    { label:"出前館",       icon:"🥫", color:"#ef4444", dark:"#1a0303" },
};
const BG    = "#080c14";
const CARD  = "#0f1520";
const INPUT = "#0a0e16";
const BDR   = "#1e293b";
const TEXT  = "#f1f5f9";
const MUTED = "#64748b";
const BLUE  = "#38bdf8";
const PURP  = "#a78bfa";
const INP = {
  background: INPUT, color: TEXT,
  border: `1px solid ${BDR}`,
  borderRadius: 7, padding: "6px 8px",
  fontSize: 14, width: "100%",
  boxSizing: "border-box", outline: "none",
};

/* ══════════════════════════════════════
   ユーティリティ
══════════════════════════════════════ */
const todayStr = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; };

function remMin(t) {
  if(!t) return 9999;
  const [h,m] = t.split(":").map(Number);
  if(isNaN(h)||isNaN(m)) return 9999;
  const e = new Date(); e.setHours(h,m,0,0);
  let diff = Math.floor((e - Date.now()) / 60000);
  if(diff < -720) diff += 1440;
  return diff;
}
function fmtDate(iso) {
  if(!iso) return "";
  const [y,mo,d] = iso.split("-");
  const dow = ["日","月","火","水","木","金","土"][new Date(`${y}-${mo}-${d}`).getDay()];
  return `${y}/${mo}/${d}(${dow})`;
}
function hhmm(d) {
  return d.toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"});
}
function timeAgo(iso) {
  const s = Math.floor((Date.now()-new Date(iso))/1000);
  if(s<60) return `${s}秒前`;
  if(s<3600) return `${Math.floor(s/60)}分前`;
  return `${Math.floor(s/3600)}時間前`;
}

/* ══════════════════════════════════════
   ストレージ（共有）
══════════════════════════════════════ */
async function loadQ() {
  try {
    const raw = localStorage.getItem("qt5");
    return raw ? JSON.parse(raw) : [];
  } catch { return []; }
}
async function saveQ(list) {
  localStorage.setItem("qt5", JSON.stringify(list));
}

/* ══════════════════════════════════════
   カスタムフック: カウントダウン
══════════════════════════════════════ */
function useCountdown(endTime) {
  const [min, setMin] = useState(() => remMin(endTime));
  useEffect(() => {
    const t = setInterval(() => setMin(remMin(endTime)), 10000);
    return () => clearInterval(t);
  }, [endTime]);
  return min;
}

/* ══════════════════════════════════════
   締切カウントダウンバッジ
══════════════════════════════════════ */
function DeadlineBadge({ time, label, firstOrderDone }) {
  const min = useCountdown(time);
  const over   = min < 0;
  const urgent = !over && min <= 30;
  const col = over ? "#ef4444" : urgent ? "#fb923c" : "#fbbf24";
  const bg  = over ? "#1f0505" : urgent ? "#1f1005" : "#1a1a05";

  // 初回受注済みならグレーアウト
  if(firstOrderDone) return (
    <div style={{
      background:"#0a0f1a", border:"1px solid #1e293b",
      borderRadius:10, padding:"8px 14px", marginBottom:8,
      display:"flex", justifyContent:"space-between", alignItems:"center",
    }}>
      <span style={{fontSize:17,color:"#374151",textDecoration:"line-through"}}>
        ⚠️ {label}: {time}まで
      </span>
      <span style={{fontSize:17,color:"#22c55e",fontWeight:700}}>✓ 受注済み</span>
    </div>
  );

  return (
    <div style={{
      background: bg,
      border: `1px solid ${col}`,
      borderRadius: 10,
      padding: "10px 14px",
      marginBottom: 8,
      boxShadow: `0 0 12px ${col}40`,
    }}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
        <span style={{fontSize:17,color:col,fontWeight:700,flexShrink:0}}>
          ⚠️ {label}: {time}まで
        </span>
        <span style={{fontSize:17,fontWeight:900,color:col,whiteSpace:"nowrap"}}>
          {(() => { const a=Math.abs(min),hh=Math.floor(a/60),mm=a%60; return over?(hh>0?`${hh}h${mm}m超過！`:`${mm}分超過！`):(hh>0?`残${hh}h${mm}m`:`残${mm}分`); })()}
        </span>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   終了時刻バッジ
══════════════════════════════════════ */
function EndBadge({ endTime, startTime }) {
  const minToEnd   = useCountdown(endTime);
  const minToStart = useCountdown(startTime);
  if(!endTime) return null;

  // 開始前
  if(startTime && minToStart > 0) {
    const d = Math.floor(minToStart / 1440);
    const h = Math.floor((minToStart % 1440) / 60);
    const m = minToStart % 60;
    const label = d >= 1 ? `${d}日${h}h後` : h >= 1 ? `${h}h${m}m後` : `${m}分後`;
    return (
      <div style={{textAlign:"center",background:"#0a0f1a",border:"1px solid #1e293b",
        borderRadius:8,padding:"8px 6px",minWidth:0}}>
        <div style={{fontSize:12,color:MUTED,lineHeight:1,whiteSpace:"nowrap"}}>開始まで</div>
        <div style={{fontSize:15,fontWeight:900,color:"#64748b",whiteSpace:"nowrap",marginTop:2}}>{label}</div>
        <div style={{fontSize:12,color:"#374151",marginTop:3,whiteSpace:"nowrap"}}>{startTime}〜</div>
      </div>
    );
  }

  // 開始後
  const over   = minToEnd < 0;
  const urgent = !over && minToEnd <= 15;
  const warn   = !over && minToEnd <= 30;
  const col = over ? "#ef4444" : urgent ? "#fb923c" : warn ? "#fbbf24" : "#34d399";
  const abs = Math.abs(minToEnd);
  const dh = Math.floor(abs / 60); const dm = abs % 60;
  const timeLabel = over
    ? (dh >= 1 ? `⚠️${dh}h${dm}m超` : `⚠️${abs}分超`)
    : (dh >= 1 ? `残${dh}h${dm}m` : `残${abs}分`);
  return (
    <div style={{textAlign:"center",background:`${col}18`,border:`1px solid ${col}`,
      borderRadius:8,padding:"8px 6px",boxShadow:`0 0 10px ${col}40`,minWidth:0}}>
      <div style={{fontSize:17,fontWeight:900,color:col,lineHeight:1,whiteSpace:"nowrap"}}>
        {timeLabel}
      </div>
      <div style={{fontSize:13,color:MUTED,marginTop:3,whiteSpace:"nowrap"}}>終了 {endTime}</div>
    </div>
  );
}

/* ══════════════════════════════════════
   報酬パネル
══════════════════════════════════════ */
function RewardPanel({ q }) {
  const done     = q.done || 0;
  const rejected = q.rejected || 0;
  const total    = done + rejected;
  const compRate = total > 0 ? Math.round(done / total * 100) : 100;
  const rateThreshold = parseInt(q.completionRate || 0);
  const rateOk   = !rateThreshold || compRate >= rateThreshold;

  // ── マルチステップ対応 ──
  const steps    = [...(q.bonuses||[])].sort((a,b)=>a.count-b.count);
  const isMulti  = steps.length > 1;
  const bonusExt = parseInt(q.bonusExtra || 0);

  // 各ステップの達成確認・累計報酬
  const earned = steps.filter(s=>done>=s.count).reduce((sum,s)=>sum+s.reward,0)
                 + (done>=q.goal && bonusExt && rateOk ? bonusExt : 0);
  const maxBonus = steps.reduce((sum,s)=>sum+s.reward,0) + bonusExt;
  const allOk    = done >= q.goal;

  if(isMulti) {
    return (
      <div style={{
        background: allOk ? "#051a05" : CARD,
        border: `1px solid ${allOk ? "#22c55e" : BDR}`,
        borderRadius: 10, padding: "10px 14px",
        boxShadow: allOk ? "0 0 20px #22c55e40" : "none",
        transition: "all 0.4s",
      }}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
          <div style={{flex:1,minWidth:0}}>
            {steps.map((s,i) => {
              const ok = done >= s.count;
              const stepCount = s.count - (i>0 ? steps[i-1].count : 0);
              return (
                <div key={i} style={{fontSize:17,color:ok?"#22c55e":MUTED,marginBottom:2,
                  display:"flex",justifyContent:"space-between"}}>
                  <span>{ok?"✓":"◯"} {i===0?stepCount:"+"+stepCount}件達成</span>
                  <span style={{fontWeight:700}}>¥{s.reward.toLocaleString()}</span>
                </div>
              );
            })}
            {bonusExt > 0 && (
              <div style={{fontSize:17,color:allOk&&rateOk?"#22c55e":MUTED,marginBottom:2,
                display:"flex",justifyContent:"space-between"}}>
                <span>{allOk&&rateOk?"✓":"◯"} 完了率{q.completionRate}%↑</span>
                <span style={{fontWeight:700}}>+¥{bonusExt.toLocaleString()}</span>
              </div>
            )}
          </div>
          <div style={{textAlign:"right",flexShrink:0}}>
            <div style={{fontSize:24,fontWeight:900,lineHeight:1,
              color:allOk?"#22c55e":earned>0?"#fbbf24":MUTED,
              textShadow:allOk?"0 0 16px #22c55e":earned>0?"0 0 10px #fbbf24":"none"}}>
              ¥{earned.toLocaleString()}
            </div>
            <div style={{fontSize:13,color:MUTED}}>/ ¥{maxBonus.toLocaleString()}</div>
          </div>
        </div>
      </div>
    );
  }

  // ── 単一ステップ（ロケットナウ等）──
  const bonusBase = parseInt(steps[0]?.reward || 0);
  const goalOk    = done >= q.goal;
  const fullOk    = goalOk && (!bonusExt || rateOk);
  const earnedS   = goalOk ? bonusBase + (rateOk ? bonusExt : 0) : 0;

  return (
    <div style={{
      background: fullOk ? "#051a05" : CARD,
      border: `1px solid ${fullOk ? "#22c55e" : BDR}`,
      borderRadius: 10, padding: "10px 14px",
      boxShadow: fullOk ? "0 0 20px #22c55e40" : "none",
      transition: "all 0.4s",
    }}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div>
          <div style={{fontSize:17,color:goalOk?"#22c55e":MUTED,marginBottom:3}}>
            {goalOk?"✓ ":"◯ "}{q.goal}件達成 → ¥{bonusBase.toLocaleString()}
          </div>
          {bonusExt > 0 && (
            <div style={{fontSize:17,color:fullOk?"#22c55e":MUTED}}>
              {fullOk?"✓ ":"◯ "}完了率{q.completionRate}%以上 → +¥{bonusExt.toLocaleString()}
            </div>
          )}
        </div>
        <div style={{textAlign:"right",flexShrink:0}}>
          <div style={{fontSize:26,fontWeight:900,lineHeight:1,
            color:fullOk?"#22c55e":MUTED,
            textShadow:fullOk?"0 0 16px #22c55e":"none"}}>
            ¥{earnedS.toLocaleString()}
          </div>
          <div style={{fontSize:13,color:MUTED}}>/ ¥{(bonusBase+bonusExt).toLocaleString()}</div>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   クエストカード
══════════════════════════════════════ */
function QuestCard({ q, me, onUpdate, onDelete, onCopy, onEdit, onMove, questIdx, questCount }) {
  const svc      = SVC[q.service] || SVC.rocket;
  const done     = q.done || 0;
  const rejected = q.rejected || 0;
  const goal     = q.goal || 1;
  const achieved = done >= goal;
  const total    = done + rejected;
  const compRate = total > 0 ? Math.round(done / total * 100) : 100;
  const rateThreshold = parseInt(q.completionRate || 0);
  const rateOk   = !rateThreshold || compRate >= rateThreshold;

  // ── マルチステップ: 次のステップまでの残り件数 ──
  const steps       = [...(q.bonuses||[])].sort((a,b)=>a.count-b.count);
  const currentStep = steps.find(s => s.count > done);       // 次の未達ステップ
  const prevStep    = [...steps].reverse().find(s=>s.count<=done); // 直前の達成済み
  const nextGoal    = currentStep ? currentStep.count : goal;
  const prevCount   = prevStep ? prevStep.count : 0;
  const left        = Math.max(0, nextGoal - done);
  // 現在ステップ内の進捗
  const stepRange   = nextGoal - prevCount;
  const pct         = stepRange > 0
    ? Math.min(100, Math.round((done - prevCount) / stepRange * 100))
    : 100;
  const stepLabel   = steps.length > 1
    ? `ステップ${steps.filter(s=>s.count<=done).length+1}/${steps.length}`
    : null;

  return (
    <div style={{
      background: CARD,
      borderRadius: 16,
      border: `1px solid ${svc.color}50`,
      borderLeft: `5px solid ${svc.color}`,
      boxShadow: `0 4px 24px ${svc.color}18`,
    }}>

      {/* ─ ヘッダー ─ */}
      <div style={{
        padding: "12px 14px 6px",
        display: "flex", justifyContent: "space-between",
        alignItems: "center", gap: 8,
      }}>
        <div style={{display:"flex",alignItems:"center",gap:8,flex:1,minWidth:0,overflow:"hidden"}}>
          <span style={{
            background: svc.dark,
            color: svc.color,
            border: `1px solid ${svc.color}`,
            borderRadius: 6,
            padding: "3px 8px",
            fontSize: 12, fontWeight: 800, flexShrink: 0,
            boxShadow: `0 0 8px ${svc.color}50`,
          }}>
            {svc.icon} {svc.label}
          </span>
          <span style={{
            fontSize: 11, color: MUTED,
            overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
          }}>{q.owner}</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
          {achieved && (
            <span style={{fontSize:17,fontWeight:800,color:"#22c55e",
              textShadow:"0 0 10px #22c55e"}}>✓ 達成！</span>
          )}
          <div style={{display:"flex",flexDirection:"column",gap:2,marginLeft:2}}>
            <button onClick={()=>onMove&&onMove(q.id,-1)} disabled={questIdx==null||questIdx===0}
              style={{background:"none",border:"none",color:(questIdx==null||questIdx===0)?"#1e293b":"#94a3b8",fontSize:18,cursor:(questIdx==null||questIdx===0)?"default":"pointer",padding:"2px 4px",lineHeight:1}}>▲</button>
            <button onClick={()=>onMove&&onMove(q.id,1)} disabled={questIdx==null||questIdx===questCount-1}
              style={{background:"none",border:"none",color:(questIdx==null||questIdx===questCount-1)?"#1e293b":"#94a3b8",fontSize:18,cursor:(questIdx==null||questIdx===questCount-1)?"default":"pointer",padding:"2px 4px",lineHeight:1}}>▼</button>
          </div>
          {me===q.owner && !achieved && (
            <><button onClick={() => onEdit && onEdit(q)} style={{background:"none",border:"none",color:"#64748b",fontSize:18,cursor:"pointer",padding:"2px 4px"}} style={{fontSize:17,fontWeight:700}}>編集</button><button onClick={() => onCopy && onCopy(q)} style={{background:"none",border:"none",color:"#64748b",fontSize:18,cursor:"pointer",padding:"2px 4px"}} style={{fontSize:17,fontWeight:700}}>コピー</button></>
          )}
          {me===q.owner && (
            <button onClick={() => onDelete(q.id)} style={{
              background:"none",border:"none",color:"#475569",
              fontSize:17,cursor:"pointer",padding:"0 4px",
            }}>✕</button>
          )}
        </div>
      </div>

      {/* ─ 日付・時間 ─ */}
      <div style={{
        padding: "0 14px 10px",
        fontSize: 14, color: MUTED,
        whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
      }}>
        {q.date && (
          <span style={{color:BLUE,marginRight:6,fontWeight:600}}>
            {fmtDate(q.date)}{q.dateTo ? `〜${fmtDate(q.dateTo)}` : ""}
          </span>
        )}
        🕐 {q.startTime} 〜 {q.endTime}
        {q.acceptWindow && (
          <span style={{marginLeft:8,color:"#475569"}}>受諾可: {q.acceptWindow}</span>
        )}
      </div>

      {/* ─ 締切アラート ─ */}
      {q.deadline && (
        <div style={{padding:"0 14px 4px"}}>
          <DeadlineBadge time={q.deadline} label="初回受注締切" firstOrderDone={done>=1}/>
        </div>
      )}

      {/* ─ メインカウンター ─ */}
      <div style={{
        display: "flex", alignItems: "center",
        background: "#060a10",
        padding: "16px 14px", gap: 14,
      }}>
        {/* 残り件数 */}
        <div style={{flexShrink:0,textAlign:"center",minWidth:64}}>
          <div style={{
            fontSize: achieved ? 38 : 52,
            fontWeight: 900, lineHeight: 1,
            color: achieved ? "#22c55e" : left<=2 ? "#ef4444" : BLUE,
            textShadow: achieved
              ? "0 0 24px #22c55e"
              : left<=2 ? "0 0 24px #ef4444"
              : `0 0 24px ${BLUE}`,
          }}>
            {achieved ? "✓" : Math.max(0, done - prevCount)}
          </div>
          <div style={{fontSize:17,color:MUTED,marginTop:4}}>
            {achieved ? "達成" : "/" + (nextGoal-prevCount) + "件"}
          </div>
          {stepLabel && !achieved && (
            <div style={{
              fontSize:13,color:svc.color,marginTop:3,fontWeight:700,
              textShadow:`0 0 6px ${svc.color}`,
            }}>{stepLabel}</div>
          )}
        </div>

        {/* ＋ / － ボタン */}
        <div style={{flex:1,display:"flex",flexDirection:"column",gap:8,alignItems:"center"}}>
          <button
            onClick={() => !achieved && onUpdate(q.id,"done",1)}
            style={{
              width: "100%", maxWidth: 110, height: 54,
              borderRadius: 12, border: "none",
              background: achieved
                ? "#1e293b"
                : "linear-gradient(135deg,#1d4ed8 0%,#6d28d9 100%)",
              color: "#fff", fontSize: 28, fontWeight: 900,
              cursor: achieved ? "default" : "pointer",
              display: "flex", alignItems: "center", justifyContent: "center",
              boxShadow: achieved
                ? "none"
                : "0 4px 16px #3b82f660, 0 0 24px #6d28d940",
            }}
          >＋</button>
          <button
            onClick={() => onUpdate(q.id,"done",-1)}
            style={{
              width: 56, height: 32, borderRadius: 8, border: "none",
              background: "#1e293b", color: MUTED, fontSize: 18,
              cursor: "pointer",
              display: "flex", alignItems: "center", justifyContent: "center",
            }}
          >－</button>
        </div>

        {/* 終了まで */}
        <div style={{flexShrink:0,width:76}}>
          <EndBadge endTime={q.endTime} startTime={q.startTime}/>
        </div>
      </div>

      {/* ─ プログレスバー ─ */}
      <div style={{height:4,background:"#060a10"}}>
        <div style={{
          height: "100%",
          width: `${pct}%`,
          background: achieved
            ? "linear-gradient(90deg,#16a34a,#22c55e)"
            : `linear-gradient(90deg,${svc.color}80,${svc.color})`,
          transition: "width 0.5s ease",
          boxShadow: `0 0 8px ${achieved?"#22c55e":svc.color}`,
        }}/>
      </div>

      {/* ─ 完了率 & 拒否件数（ロケットナウ） ─ */}
      {q.service==="rocket" && q.completionRate && (
        <div style={{background:"#060a10",padding:"10px 14px"}}>
          <div style={{
            display:"flex",alignItems:"center",
            justifyContent:"space-between",gap:10,flexWrap:"wrap",
          }}>
            {/* 拒否カウンター */}
            <div style={{display:"flex",alignItems:"center",gax:8}}>
              <span style={{fontSize:17,color:MUTED,flexShrink:0}}>拒否件数</span>
              <button onClick={() => onUpdate(q.id,"rejected",-1)} style={{
                background:"#1e293b",border:"none",color:MUTED,
                borderRadius:6,width:28,height:28,fontSize:17,cursor:"pointer",
                display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,
              }}>－</button>
              <span style={{
                fontSize:18,fontWeight:800,color:"#fb923c",
                minWidth:24,textAlign:"center",
                textShadow:"0 0 10px #fb923c70",
              }}>{rejected}</span>
              <button onClick={() => onUpdate(q.id,"rejected",1)} style={{
                background:"#7c2d12",border:"none",color:"#fb923c",
                borderRadius:6,width:28,height:28,fontSize:17,cursor:"pointer",
                display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,
              }}>＋</button>
            </div>

/* ══════════════════════════════════════
   正規表現パーサー

function Lbl({ children }) {
  return (
    <div style={{fontSize:17,color:MUTED,fontWeight:600,marginBottom:6}}>
      {children}
    </div>
  );
}

function Field({ label, type, val, set, placeholder }) {
  return (
    <div style={{minWidth:0,marginBottom:12}}>
      <Lbl>{label}</Lbl>
      <input
        type={type}
        style={INP}
        value={val}
        onChange={e => set(e.target.value)}
        placeholder={placeholder}
        min={type==="number" ? 0 : undefined}
      />
    </div>
  );
}

function Row2({ children }) {
  return (
    <div style={{
      display: "grid",
      gridTemplateColumns: "1fr 1fr",
      gap: 12,
      marginBottom: 12,
    }}>
      {children}
    </div>
  );
}

function SecHead({ children }) {
  return (
    <div style={{
      fontSize:17,fontWeight:700,color:MUTED,
      margin:"4px 0 8px",letterSpacing:"0.04em",
    }}>
      {children}
    </div>
  );
}

/* 数値ステッパー（大きいボタン＋プリセット） */
function NumStepper({ label, val, set, step=1, min=0, max=9999, presets }) {
  const n = parseInt(val) || 0;
  const up   = () => set(String(Math.min(max, n + step)));
  const down = () => set(String(Math.max(min, n - step)));
  const SB = { // stepper button
    border:"none", borderRadius:10, cursor:"pointer",
    width:44, height:44, fontSize:22, fontWeight:900,
    display:"flex", alignItems:"center", justifyContent:"center",
    flexShrink:0,
  };
  return (
    <div style={{minWidth:0, marginBottom:12}}>
      <Lbl>{label}</Lbl>
      <div style={{display:"flex", alignItems:"center", gap:8}}>
        <button onClick={down} style={{...SB, background:"#1e293b", color:"#94a3b8"}}>－</button>
        <input
          type="number"
          value={val}
          onChange={e => set(e.target.value)}
          style={{
            ...INP, marginBottom:0,
            textAlign:"center", fontSize:22, fontWeight:900,
            color:TEXT, padding:"10px 6px",
          }}
        />
        <button onClick={up} style={{...SB, background:"linear-gradient(135deg,#1d4ed8,#6d28d9)",
          color:"#fff", boxShadow:"0 2px 8px #3b82f640"}}>＋</button>
      </div>
      {presets && (
        <div style={{display:"flex", gap:6, marginTop:6, flexWrap:"wrap"}}>
          {presets.map(p => (
            <button key={p} onClick={() => set(String(p))} style={{
              background: parseInt(val)===p ? "#1d4ed8" : "#1e293b",
              border: parseInt(val)===p ? "1px solid #3b82f6" : `1px solid ${BDR}`,
              color: parseInt(val)===p ? "#fff" : "#94a3b8",
              borderRadius:8, padding:"4px 10px",
              fontSize:17, fontWeight:700, cursor:"pointer",
              boxShadow: parseInt(val)===p ? "0 0 8px #3b82f640" : "none",
            }}>{p}</button>
          ))}
        </div>
      )}
    </div>
  );
}

function OKBtn({ onClick, disabled, children }) {
  return (
    <button
      onClick={onClick}
      disabled={disabled}
      style={{
        width:"100%",padding:14,borderRadius:12,border:"none",marginTop:8,
        background: disabled
          ? "#1e293b"
          : "linear-gradient(135deg,#1d4ed8,#6d28d9)",
        color: disabled ? "#475569" : "#fff",
        fontSize:17,fontWeight:700,
        cursor: disabled ? "default" : "pointer",
        boxShadow: disabled
          ? "none"
          : "0 4px 20px #3b82f650, 0 0 30px #6d28d930",
        letterSpacing:"0.02em",
      }}
    >
      {children}
    </button>
  );
}

  useEffect(()=>{
    if(!prefill) return;
    setF(p=>({...p, date:prefill.date||p.date, start:prefill.startTime||p.start, end:prefill.endTime||p.end}));
    if(prefill.bonuses && prefill.bonuses.length > 0) {
      setSteps(prefill.bonuses.map((b,i,arr)=>({count:String(b.count-(i>0?arr[i-1].count:0)),reward:String(b.reward)})));

      setSteps(p=>{const n=[...p]; n[n.length-1]={...n[n.length-1],count:String(prefill.goal)}; return n;});

  const bonuses = steps.filter(st=>st.count&&st.reward).reduce((acc,st)=>[...acc,{count:(acc.length?acc[acc.length-1].count:0)+parseInt(st.count),reward:parseInt(st.reward)}],[]);
  const goal    = bonuses.length > 0 ? bonuses[bonuses.length-1].count : 0;

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>

      ) : (

      <Row2>
        <Field label="開始時刻" type="time" val={f.start} set={v=>s("start",v)}/>

/* ══════════════════════════════════════
   カウンターパネル（登録クエスト連動）
══════════════════════════════════════ */
function CounterPanel({ quests, onUpdate }) {
  const [open, setOpen] = useState(false);
  const [showSummary, setShowSummary] = useState(false);
  const activeQuests = quests.filter(q => (q.done||0) < q.goal);

  // 確定報酬計算
  const confirmedReward = quests.reduce((sum, q) => {
    const done = q.done || 0;
    const steps = [...(q.bonuses||[])].sort((a,b)=>a.count-b.count);
    const stepEarned = steps.filter(s => done >= s.count).reduce((s,b)=>s+b.reward,0);
    const allDone = steps.length > 0 && done >= steps[steps.length-1].count;
    const bExtra = allDone ? parseInt(q.bonusExtra||0) : 0;
    return sum + stepEarned + bExtra;
  }, 0);
  const totalDone = quests.reduce((s,q)=>s+(q.done||0),0);

  // サマリーモーダル
  const SummaryModal = () => {
    const hourMap = {};
    quests.forEach(q => {
      const lg = q.deliveryLog||[];
      lg.forEach(entry => {
        const hh = new Date(entry.at).getHours();
        hourMap[hh] = (hourMap[hh]||0) + 1;
      });
    });
    const hours = Object.keys(hourMap).sort((a,b)=>+a-+b);
    const maxC = Math.max(...Object.values(hourMap), 1);
    const svcColor = {"ubereats":"#00FF00","demae":"#FF0000","rocketnow":"#FF8C00"};
    return (
      <div onClick={()=>setShowSummary(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:9000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
        <div onClick={e=>e.stopPropagation()} style={{background:"#0d1520",border:"1px solid #1e3a4a",borderRadius:16,padding:20,width:"100%",maxWidth:480,maxHeight:"80vh",overflowY:"auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div style={{fontSize:17,fontWeight:700,color:"#fff"}}>📊 今日のサマリー</div>
            <button onClick={()=>setShowSummary(false)} style={{background:"none",border:"none",color:"#888",fontSize:20,cursor:"pointer"}}>×</button>
          </div>
          {/* 時間帯グラフ */}
          {hours.length > 0 && (
            <div style={{marginBottom:20}}>
              <div style={{fontSize:13,color:"#8ab4c8",marginBottom:8}}>🕑 時間帯別配達件数</div>
              <div style={{display:"flex",alignItems:"flex-end",gap:6,height:80,padding:"0 4px"}}>
                {hours.map(h => (
                  <div key={h} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                    <div style={{width:"100%",background:"linear-gradient(180deg,#4FC3F7,#1565C0)",borderRadius:"4px 4px 0 0",height:Math.round(hourMap[h]/maxC*64)+"px",minHeight:4}}></div>
                    <div style={{fontSize:11,color:"#64748b"}}>{h}時</div>
                    <div style={{fontSize:12,fontWeight:700,color:"#FFD700"}}>{hourMap[h]}</div>
                  </div>
                ))}
              </div>
            </div>
          )}
          {/* クエスト報酬サマリー */}
          <div style={{fontSize:13,color:"#8ab4c8",marginBottom:10}}>🏆 クエスト報酬内訳</div>
          {quests.map((q,i) => {
            const done = q.done||0;
            const steps = [...(q.bonuses||[])].sort((a,b)=>a.count-b.count);
            const stepR = steps.filter(s=>done>=s.count).reduce((s,b)=>s+b.reward,0);
            const allDone = steps.length>0&&done>=steps[steps.length-1].count;
            const bExtra = allDone?parseInt(q.bonusExtra||0):0;
            const total = stepR+bExtra;
            const goal = q.goal||1;
            const pct = Math.min(100,Math.round(done/goal*100));
            const svc = (q.service||"").toLowerCase();

function ScrollTopBtn() {
  const [vis, setVis] = useState(false);

    const onScroll = () => setVis(window.scrollY > 200);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);

  if(!vis) return null;
  return (
    <button onClick={() => window.scrollTo({top:0,behavior:'smooth'})}
      style={{position:'fixed',bottom:84,left:16,zIndex:60,
        background:'#1e293b',border:'1px solid #334155',

        fontSize:20,cursor:'pointer',display:'flex',
        alignItems:'center',justifyContent:'center',
        boxShadow:'0 4px 16px rgba(0,0,0,.6)'}}>
      ↑
    </button>
  );
}

                lg.forEach(e=>{const hh=new Date(e.at).getHours();hourMap[hh]=(hourMap[hh]||0)+1;});
                for(let i=1;i<lg.length;i++){const df=(new Date(lg[i].at)-new Date(lg[i-1].at))/60000;if(df>1&&df<90){totalTime+=df;timeCount++;}}
                if(q.startedAt){const st=new Date(q.startedAt);if(!earliest||st<earliest)earliest=st;}
                if(q.completedAt){const ct=new Date(q.completedAt);if(!latest||ct>latest)latest=ct;}
              });
              const hours=Object.keys(hourMap).sort((a,b)=>+a-+b);
              const maxC=Math.max(...Object.values(hourMap),1);
              const eh=earliest&&latest?(latest-earliest)/3600000:0;
              const hy=eh>0.1?Math.round(totalReward/eh):0;
              const avgMin=timeCount>0?Math.round(totalTime/timeCount):0;
              const fmt=m=>m<60?m+"分":Math.floor(m/60)+"h"+String(m%60).padStart(2,"0")+"m";
              return (<>
                {/* KPIカード */}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
                  {[
                    {label:"合計件数",val:totalDone+"件",col:"#4FC3F7"},
                    {label:"確定報酬",val:"￥"+totalReward.toLocaleString(),col:"#FFD700"},
                    {label:"実質時給",val:hy>0?"￥"+hy.toLocaleString()+"/h":"---",col:"#00FF00"},
                    {label:"平均所要時間",val:avgMin>0?fmt(avgMin):"---",col:"#FF8C00"},
                  ].map((k,i)=>(
                    <div key={i} style={{background:"rgba(255,255,255,0.05)",borderRadius:12,padding:14,border:"1px solid rgba(255,255,255,0.08)",textAlign:"center"}}>
                      <div style={{fontSize:12,color:"#64748b",marginBottom:4}}>{k.label}</div>
                      <div style={{fontSize:20,fontWeight:900,color:k.col}}>{k.val}</div>
                    </div>
                  ))}
                </div>
                {/* 時間帯グラフ */}
                {hours.length>0&&(<>
                  <div style={{fontSize:14,color:"#8ab4c8",marginBottom:10,fontWeight:700}}>⏱ 時間帯別配達件数</div>
                  <div style={{display:"flex",alignItems:"flex-end",gap:5,height:100,padding:"0 4px",marginBottom:20,background:"rgba(0,0,0,0.3)",borderRadius:10,paddingTop:10}}>
                    {hours.map(h=>(
                      <div key={h} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                        <div style={{fontSize:11,fontWeight:700,color:"#FFD700"}}>{hourMap[h]}</div>
                        <div style={{width:"80%",background:"linear-gradient(180deg,#4FC3F7,#1565C0)",borderRadius:"4px 4px 0 0",height:Math.round(hourMap[h]/maxC*60)+"px",minHeight:4}}></div>
                        <div style={{fontSize:10,color:"#64748b"}}>{h}時</div>
                      </div>
                    ))}
                  </div>
                </>)}
                {/* サービス別比較 */}
                <div style={{fontSize:14,color:"#8ab4c8",marginBottom:10,fontWeight:700}}>🏆 サービス別比較</div>
                {Object.entries(svcMap).map(([svc,sv],i)=>(
                  <div key={i} style={{marginBottom:12}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                      <div style={{fontSize:14,fontWeight:700,color:sv.color}}>{svc}</div>
                      <div style={{fontSize:14,color:"#fff"}}>{sv.done}件 &nbsp;<span style={{color:"#FFD700"}}>￥{sv.reward.toLocaleString()}</span></div>
                    </div>
                    <div style={{height:8,background:"rgba(255,255,255,0.1)",borderRadius:4}}>
                      <div style={{width:(totalDone>0?Math.round(sv.done/totalDone*100):0)+"%",height:"100%",background:sv.color,borderRadius:4,transition:"width .3s"}}></div>
                    </div>
                  </div>
                ))}
                {/* 配達ペース */}
                {avgMin>0&&(
                  <div style={{marginTop:16,background:"rgba(255,215,0,0.05)",borderRadius:12,padding:14,border:"1px solid rgba(255,215,0,0.2)"}}>
                    <div style={{fontSize:13,color:"#FFD700",fontWeight:700,marginBottom:6}}>💡 ペース分析</div>
                    <div style={{fontSize:13,color:"#94a3b8"}}>1時間あたり約<span style={{color:"#fff",fontWeight:700}}> {Math.round(60/avgMin)} 件</span>のペース</div>
                    {hy>0&&<div style={{fontSize:13,color:"#94a3b8",marginTop:4}}>現在の時給は<span style={{color:"#FFD700",fontWeight:700}}> ￥{hy.toLocaleString()} </span>円/hペース</div>}
                  </div>
                )}
              </>);
            })()}
          </div>
        </div>
      )}

      {showSettings && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:200,
          display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
          <div style={{background:CARD,borderRadius:18,padding:20,width:"100%",
            maxWidth:360,boxSizing:"border-box",border:`1px solid ${BDR}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
              <div style={{fontSize:17,fontWeight:800}}>⚙️ 設定</div>
              <button onClick={()=>setShowSettings(false)} style={{background:"none",border:"none",color:MUTED,fontSize:20,cursor:"pointer"}}>✕</button>
            </div>
            <div style={{fontSize:17,color:MUTED,fontWeight:700,marginBottom:10}}>使用するサービス</div>
            {Object.entries(SVC).map(([key,sv]) => {
              const on = enabledSvc[key];
              const onlyone = Object.values(enabledSvc).filter(Boolean).length===1;
              return (
                <div key={key} onClick={()=>toggleSvc(key)} style={{
                  display:"flex",alignItems:"center",justifyContent:"space-between",
                  padding:"12px 14px",borderRadius:12,marginBottom:8,
                  background: on ? sv.dark : INPUT,
                  border:`1px solid ${on ? sv.color : BDR}`,
                  cursor: onlyone&&on ? "not-allowed" : "pointer",
                  boxShadow: on ? `0 0 12px ${sv.color}30` : "none",
                  opacity: onlyone&&on ? 0.5 : 1,
                  transition:"all 0.2s",
                }}>
                  <span style={{fontSize:17,fontWeight:700,color:on?sv.color:MUTED}}>
                    {sv.icon} {sv.label}
                  </span>
                  <div style={{
                    width:42,height:24,borderRadius:12,
                    background: on ? sv.color : "#374151",
                    position:"relative",transition:"background 0.2s",
                    boxShadow: on ? `0 0 8px ${sv.color}60` : "none",
                  }}>
                    <div style={{
                      position:"absolute",top:3,
                      left: on ? 21 : 3,
                      width:18,height:18,borderRadius:"50%",
                      background:"#fff",transition:"left 0.2s",
                    }}/>
                  </div>
                </div>
              );
            })}
            <div style={{fontSize:17,color:MUTED,marginTop:8,textAlign:"center"}}>
              ※ 最低1つは有効にしてください
            </div>

            {/* 自動更新間隔 */}
            <div style={{marginTop:20,borderTop:"1px solid #1e3a4a",paddingTop:16}}>
              <div style={{fontSize:15,color:MUTED,fontWeight:700,marginBottom:10}}>🔄 自動更新間隔</div>
              <div style={{display:"flex",gap:8}}>
                {[15,30,60].map(sec=>(
                  <button key={sec} onClick={()=>{setAutoReload(sec);localStorage.setItem("qt_reload",sec);}} style={{flex:1,padding:"10px 0",borderRadius:10,border:"1px solid "+(autoReload===sec?"#4FC3F7":"#1e3a4a"),background:autoReload===sec?"rgba(79,195,247,0.15)":"transparent",color:autoReload===sec?"#4FC3F7":MUTED,fontWeight:700,fontSize:15,cursor:"pointer"}}>{sec}秒</button>
                ))}
              </div>
            </div>

            {/* ライダー名 */}
            <div style={{marginTop:16}}>
              <div style={{fontSize:15,color:MUTED,fontWeight:700,marginBottom:8}}>🚴 ライダー名</div>
              <div style={{display:"flex",gap:8}}>
                <input value={riderName} onChange={e=>setRiderName(e.target.value)} placeholder="任意メモ用" style={{flex:1,padding:"10px 12px",borderRadius:10,border:"1px solid #1e3a4a",background:"#0a0f1a",color:"#fff",fontSize:15}}/>
                <button onClick={()=>localStorage.setItem("qt_name",riderName)} style={{padding:"10px 16px",borderRadius:10,background:"#1e3a4a",border:"none",color:"#4FC3F7",fontWeight:700,fontSize:15,cursor:"pointer"}}>保存</button>
              </div>
            </div>

            {/* データエクスポート */}
            <div style={{marginTop:16}}>
              <div style={{fontSize:15,color:MUTED,fontWeight:700,marginBottom:8}}>📋 日報コピー</div>
              <button onClick={copyDailyReport} style={{width:"100%",padding:"12px 0",borderRadius:10,background:"rgba(79,195,247,0.1)",border:"1px solid #4FC3F7",color:"#4FC3F7",fontWeight:700,fontSize:15,cursor:"pointer"}}>📋 クリップボードにコピー</button>
            </div>

            {/* グラフ・分析 */}
            <div style={{marginTop:16}}>
              <button onClick={()=>{setShowGraph(true);setShowSettings(false);}} style={{width:"100%",padding:"12px 0",borderRadius:10,background:"rgba(255,215,0,0.1)",border:"1px solid #FFD700",color:"#FFD700",fontWeight:700,fontSize:15,cursor:"pointer"}}>📊 グラフ・分析を見る</button>
            </div>

          </div>
        </div>
      )}

      {/* ── 登録フォーム ── */}
      {showForm && (
        <div style={{padding:"10px 12px 4px"}}>
          <div style={{
            background: CARD,
            borderRadius: 14, padding: 16,
            border: `1px solid ${BDR}`,
            boxSizing: "border-box",
          }}>
            
            {/* サービス選択 */}
            <div style={{display:"flex",gap:8,marginBottom:16}}>
              {Object.entries(SVC).filter(([key])=>enabledSvc[key]).map(([key,sv]) => (
                <button key={key} onClick={() => setSvc(key)} style={{
                  flex:1,padding:"10px 4px",borderRadius:10,cursor:"pointer",
                  fontWeight:700,fontSize:17,minWidth:0,
                  border:`2px solid ${svc===key ? sv.color : BDR}`,
                  background: svc===key ? sv.dark : INPUT,
                  color: svc===key ? sv.color : MUTED,
                  boxSizing:"border-box",
                  boxShadow: svc===key ? `0 0 14px ${sv.color}50` : "none",
                  transition:"all 0.2s",
                }}>
                  <div style={{fontSize:18}}>{sv.icon}</div>
                  <div style={{marginTop:3,fontSize:17,lineHeight:1.3}}>{sv.label}</div>
                </button>
              ))}
            </div>
            {svc==="rocket"   && <RocketForm onAdd={handleAdd} prefill={prefill}/>}
            {svc==="demae"    && <DemaeForm  onAdd={handleAdd} prefill={prefill}/>}
            {svc==="ubereats" && <UEForm     onAdd={handleAdd} prefill={prefill}/>}
          </div>
        </div>
      )}

      {/* ── クエスト一覧 ── */}
      {loading ? (
        <div style={{textAlign:"center",padding:"60px 20px",color:MUTED}}>
          読み込み中...
        </div>
      ) : showForm ? null : quests.length===0 ? (
        <div style={{textAlign:"center",padding:"60px 20px",color:MUTED,lineHeight:2}}>
          <div style={{fontSize:36,marginBottom:10}}>📋</div>
          クエストがまだありません。<br/>「＋ 追加」から登録してください。
        </div>
      ) : (
        <div style={{padding:"10px 12px",display:"flex",flexDirection:"column",gap:10}}>
          {[...quests].filter(q=>hideCompleted?(q.done||0)<q.goal:true).sort((a,b)=>{
            const da=(a.date||'')+(a.startTime||'');
            const db=(b.date||'')+(b.startTime||'');
            return da.localeCompare(db);
          }).map((q,qi) => (
            <QuestCard key={q.id} q={q} me={me}
              onUpdate={handleUpdate} onDelete={handleDelete} onCopy={handleCopy} onEdit={handleEdit} onMove={handleMove} questIdx={qi} questCount={quests.length}/>
          ))}
        </div>
      )}

      <div style={{textAlign:"center",padding:"12px 0",fontSize:17,color:"#111827"}}>
        🌐 みんなで共有中
      </div>
      <CounterPanel quests={quests} onUpdate={handleUpdate}/>
      <ScrollTopBtn/>
      {/* TOPへ戻るボタン */}
    </div>
  );
}
