<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>マギト・ログ ～クイズ魔法学園の記憶～</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#ffd700;--bg:#050818;--pixel:'DotGothic16',sans-serif}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg)}

/* ピクセルフォント */
.px{font-family:'DotGothic16',sans-serif;letter-spacing:.05em}
.px-text{font-family:'DotGothic16',sans-serif;font-size:clamp(14px,3.5vw,20px);color:#d8ceff;line-height:2;text-shadow:2px 2px 0 #000;letter-spacing:.08em}

/* 星背景 */
#stars{position:fixed;inset:0;z-index:0;pointer-events:none}
.star{position:absolute;background:#fff;border-radius:50%;animation:twink var(--d,3s) var(--dl,0s) infinite alternate}
@keyframes twink{from{opacity:.1}to{opacity:.9}}

/* 共通レイアウト */
#wrap{position:fixed;inset:0;overflow-y:auto;z-index:1;display:flex;flex-direction:column;align-items:center;padding:16px 16px 32px}

/* スクリーン切り替え */
.screen{width:100%;max-width:640px;display:none;flex-direction:column;align-items:center;gap:12px}
.screen.active{display:flex}

/* ボタン */
.btn{font-family:'DotGothic16',sans-serif;font-size:clamp(14px,3.5vw,18px);letter-spacing:.08em;text-shadow:1px 1px 0 #000;padding:12px 24px;border:none;border-radius:8px;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
.btn:active{transform:scale(.96)}
.btn-purple{background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;box-shadow:0 0 16px rgba(139,92,246,.5)}
.btn-gold{background:linear-gradient(135deg,#d97706,#ffd700);color:#1a0a00;box-shadow:0 0 16px rgba(255,215,0,.4)}
.btn-outline{background:rgba(124,58,237,.15);border:1.5px solid rgba(124,58,237,.5);color:#c4b5fd}
.btn-w{width:100%;max-width:420px}

/* タイトルバナー */
.banner{width:100%;max-width:640px;border-radius:12px;overflow:hidden;position:relative;aspect-ratio:16/9}
.banner img{width:100%;height:100%;object-fit:cover}
.banner-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.1),rgba(5,8,24,.7))}

/* プロローグ */
#prologue-box{text-align:center;padding:8px 0}
.pline{display:block;opacity:0;transform:translateY(8px);animation:fadeUp .7s forwards}
@keyframes fadeUp{to{opacity:1;transform:none}}

/* キャラメイク */
.chara-img-wrap{width:100%;max-width:480px;border-radius:12px;overflow:hidden;border:2px solid rgba(124,58,237,.4)}
.chara-img-wrap img{width:100%;display:block}
.section-label{font-family:'DotGothic16',sans-serif;font-size:13px;color:#a78bfa;letter-spacing:.15em;margin-bottom:6px;text-align:center}
.choice-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.cbtn{font-family:'DotGothic16',sans-serif;font-size:clamp(12px,3vw,15px);letter-spacing:.06em;background:rgba(124,58,237,.15);border:1.5px solid rgba(124,58,237,.35);color:#c4b5fd;padding:8px 14px;border-radius:20px;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
.cbtn:active,.cbtn.sel{background:rgba(139,92,246,.7)!important;border:2.5px solid #c4b5fd!important;color:#fff!important;box-shadow:0 0 14px rgba(167,139,250,.7),inset 0 0 8px rgba(255,255,255,.1)!important}

/* 問答 */
.q-num{font-family:'DotGothic16',sans-serif;font-size:12px;color:#7c3aed;letter-spacing:.2em}
.q-text{font-family:'DotGothic16',sans-serif;font-size:clamp(16px,4vw,22px);color:#e2d9ff;text-align:center;line-height:1.8;text-shadow:2px 2px 0 #000;letter-spacing:.08em}
.wave{height:6px;border-radius:3px;background:linear-gradient(90deg,#7c3aed,#a78bfa,#7c3aed);background-size:200%;animation:waveAnim 2s infinite;margin:4px 0}
@keyframes waveAnim{0%{background-position:0%}100%{background-position:200%}}
.qbtn{font-family:'DotGothic16',sans-serif;font-size:clamp(13px,3.2vw,16px);letter-spacing:.05em;text-shadow:1px 1px 0 #000;width:100%;max-width:420px;text-align:left;padding:12px 16px;background:rgba(124,58,237,.18);border:1.5px solid rgba(124,58,237,.3);color:#d8ceff;border-radius:10px;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
.qbtn:active,.qbtn:hover{background:rgba(124,58,237,.4);border-color:#a78bfa;color:#fff}

/* マギト誕生 */
.magit-img{width:clamp(160px,45vw,240px);height:clamp(160px,45vw,240px);object-fit:contain;background:transparent;filter:drop-shadow(0 0 20px var(--mc,#a78bfa));animation:bounce 1.2s infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-10px)}}
.species-name{font-family:'DotGothic16',sans-serif;font-size:clamp(18px,5vw,26px);color:var(--mc,#a78bfa);text-shadow:2px 2px 0 #000,0 0 16px var(--mc,#a78bfa);letter-spacing:.1em}
.species-desc{font-family:'DotGothic16',sans-serif;font-size:clamp(12px,3vw,15px);color:#c4b5fd;text-align:center;line-height:1.9;text-shadow:1px 1px 0 #000;max-width:380px;letter-spacing:.05em}
.name-input{font-family:'DotGothic16',sans-serif;font-size:18px;letter-spacing:.1em;background:rgba(124,58,237,.15);border:2px solid rgba(124,58,237,.5);color:#fff;padding:10px 20px;border-radius:20px;text-align:center;width:220px;outline:none;text-shadow:1px 1px 0 #000}
.name-input:focus{border-color:#a78bfa;box-shadow:0 0 12px rgba(139,92,246,.4)}

/* クイズ */
.quiz-hdr{width:100%;max-width:600px;display:flex;justify-content:space-between;align-items:center;background:rgba(124,58,237,.12);border-radius:10px;padding:8px 14px;border:1px solid rgba(124,58,237,.2)}
.hdr-label{font-family:'DotGothic16',sans-serif;font-size:10px;color:#7c3aed;letter-spacing:.15em}
.hdr-val{font-family:'DotGothic16',sans-serif;font-size:15px;font-weight:700;color:var(--mc,#a78bfa);text-shadow:1px 1px 0 #000}
.quiz-q{font-family:'DotGothic16',sans-serif;font-size:clamp(14px,3.5vw,18px);letter-spacing:.06em;color:#e2d9ff;text-align:center;line-height:1.9;text-shadow:1px 1px 0 #000;background:rgba(255,255,255,.04);border:1px solid rgba(124,58,237,.2);border-radius:12px;padding:14px;width:100%;max-width:600px}
.qc-btn{font-family:'DotGothic16',sans-serif;font-size:clamp(12px,3vw,15px);letter-spacing:.05em;text-shadow:1px 1px 0 #000;width:100%;max-width:600px;text-align:left;padding:12px 16px;background:rgba(124,58,237,.12);border:1.5px solid rgba(124,58,237,.25);color:#c4b5fd;border-radius:10px;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
.qc-btn:hover,.qc-btn:active{background:rgba(124,58,237,.35);border-color:#a78bfa;color:#fff}
.qc-btn.correct{background:rgba(34,197,94,.2);border-color:#4ade80;color:#4ade80;pointer-events:none}
.qc-btn.wrong{background:rgba(239,68,68,.15);border-color:#f87171;color:#f87171;pointer-events:none}
.word-chip{font-family:'DotGothic16',sans-serif;font-size:12px;letter-spacing:.05em;background:rgba(124,58,237,.2);border:1px solid rgba(124,58,237,.35);color:#c4b5fd;padding:3px 10px;border-radius:99px;display:inline-block;margin:2px;text-shadow:1px 1px 0 #000}
.xp-pop{position:fixed;top:35%;left:50%;transform:translate(-50%,-50%);font-family:'DotGothic16',sans-serif;font-size:28px;letter-spacing:.1em;color:#ffd700;text-shadow:2px 2px 0 #000,0 0 16px #ffd700;pointer-events:none;animation:xpFloat 1.5s forwards;z-index:99}
@keyframes xpFloat{0%{opacity:1;transform:translate(-50%,-60%)}100%{opacity:0;transform:translate(-50%,-160%)}}

/* ホワイトアウト */
.wo{position:fixed;inset:0;background:#fff;z-index:999;animation:wo .9s forwards;pointer-events:none}
@keyframes wo{0%{opacity:0}40%{opacity:1}100%{opacity:0}}
</style>
</head>

  <div class="px" id="birth-title" style="font-size:clamp(16px,4vw,22px);color:#ffd700;text-shadow:2px 2px 0 #000;letter-spacing:.08em;text-align:center"></div>

</div>

</div><!-- /wrap -->

const shuf=a=>{for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;};

// スタートボタンを表示（スマホautoplay対策：ユーザー操作後に音声解放）
function showStartBtn(){
  const btns=document.getElementById('prologue-btns');
  btns.innerHTML='<button class="btn btn-gold btn-w" onclick="startPrologue()">✦ Logを起動する</button>';
  btns.style.display='flex';
}
function startPrologue(){
  document.getElementById('prologue-btns').style.display='none';
  // ミュートボタン表示
  document.getElementById('mute-btn').style.display='flex';
  runPrologue();
}

// ミュート制御
let _voMuted=false;
function toggleVoMute(){
  _voMuted=!_voMuted;
  const btn=document.getElementById('mute-btn');
  btn.textContent=_voMuted?'🔇':'🔊';
  // 現在VO_CACHEにある全音声にミュート反映
  Object.values(VO_CACHE).forEach(a=>a.muted=_voMuted);
}

// 行インデックス→音声番号マップ（空行はnull）
const VO_MAP=[1,2,3,4,null,5,6,null,7,null,8,9,10,null,11,12];
const VO_CACHE={};
function getVO(n){
  if(!n) return null;
  const k='magit_vo_'+(n<10?'0'+n:n)+'.wav';
  if(!VO_CACHE[k]){VO_CACHE[k]=new Audio('audio/'+k);VO_CACHE[k].volume=0.85;}
  return VO_CACHE[k];
}
async function runPrologue(){
  const box=document.getElementById('prologue-box');
  VO_MAP.forEach(n=>getVO(n));
  for(let i=0;i<LINES.length;i++){
    const sp=document.createElement('span');
    sp.className='pline px-text';
    sp.style.animationDelay='0s';
    sp.textContent=LINES[i]||'　';
    box.appendChild(sp);
    const vo=getVO(VO_MAP[i]);
    if(vo&&!_voMuted){
      vo.muted=false;
      await new Promise(res=>{
        vo.currentTime=0;
        vo.onended=()=>{ setTimeout(res,80); };
        vo.onerror=res;
        vo.play().catch(res);
        setTimeout(res,8000);
      });
    } else if(vo&&_voMuted){
      await sleep(600); // ミュート時は0.6秒ごとに次行
    } else {
      await sleep(300);
    }
  }
  await sleep(1200);
  showPrologueBtns(false);
}
function showPrologueBtns(returning){
  const div=document.getElementById('prologue-btns');
  div.style.display='flex';
  if(returning){
    div.innerHTML='<button class="btn btn-purple btn-w" onclick="continueGame()">✦ 続きからはじめる</button>'
      +'<button class="btn btn-outline btn-w" onclick="newGame()">🔄 最初からはじめる</button>';
  } else {
    document.getElementById('mute-btn').style.display='none';
    div.innerHTML='<button class="btn btn-gold btn-w" onclick="playStartSE();wo(startChara)">✦ Logを起動する</button>';
  }
}
function playStartSE(){
  try{const se=new Audio('audio/start_sound.mp3');se.volume=0.7;se.play().catch(()=>{});}catch(e){}
}

// ── キャラメイク ──
function drawCharacter(){
  const cv=document.getElementById('charaCanvas');
  if(!cv) return;
  const c=cv.getContext('2d');
  const W=cv.width,H=cv.height;
  c.clearRect(0,0,W,H);
  // 背景
  const bg=c.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#0d0528');bg.addColorStop(1,'#050818');
  c.fillStyle=bg;c.fillRect(0,0,W,H);

  // magit_chara.pngをグレー透明化してキャッシュ
  if(!window._charaReady){
    if(!window._charaImg){
      window._charaImg=new Image();
      window._charaImg.crossOrigin='anonymous';
      window._charaImg.onload=()=>{
        const oc=document.createElement('canvas');
        oc.width=1380;oc.height=752;
        const oc2=oc.getContext('2d');
        oc2.drawImage(window._charaImg,0,0);
        const id=oc2.getImageData(0,0,1380,752);
        const d=id.data;
        for(let i=0;i<d.length;i+=4){
          const r=d[i],g=d[i+1],b=d[i+2];
          if(Math.abs(r-g)<28&&Math.abs(g-b)<28&&r>95&&r<180) d[i+3]=0;
        }
        oc2.putImageData(id,0,0);
        window._charaSrc=oc;
        window._charaReady=true;
        drawCharacter();
      };
      window._charaImg.src='images/magit_chara.png';
    }
    return;
  }
  const src=window._charaSrc;

  // パーツ座標 (1380x752画像内)
  const P={
    boy:{x:60,y:55,w:230,h:390},
    girl:{x:310,y:55,w:230,h:390},
    tsum:{x:555,y:60,w:200,h:230},
    mash:{x:762,y:60,w:195,h:230},
    side:{x:962,y:60,w:195,h:230},
    pony:{x:555,y:225,w:200,h:190},
    bob:{x:762,y:225,w:195,h:190},
    twin:{x:962,y:225,w:410,h:190},
    dot:{x:555,y:430,w:200,h:210},
    sparkly:{x:762,y:430,w:195,h:210},
    cool:{x:962,y:430,w:195,h:210},
    mystic:{x:1162,y:430,w:215,h:210},
    lib_boy:{x:5,y:490,w:180,h:255},
    drama_boy:{x:195,y:490,w:180,h:255},
    astro_boy:{x:385,y:490,w:160,h:255},
    news_boy:{x:385,y:490,w:160,h:255},
    game_boy:{x:195,y:490,w:180,h:255},
    lib_girl:{x:555,y:490,w:200,h:255},
    drama_girl:{x:762,y:490,w:190,h:255},
    astro_girl:{x:962,y:490,w:400,h:255},
    news_girl:{x:962,y:490,w:400,h:255},
    game_girl:{x:762,y:490,w:190,h:255},
  };

  const gender=chara.gender||'boy';
  const aptColors={lib:'#60a5fa',astro:'#a78bfa',drama:'#fb7185',news:'#4ade80',game:'#fbbf24'};
  const auraC=aptColors[chara.apt]||'#7c3aed';

  // オーラ
  const aura=c.createRadialGradient(W/2,H*0.45,5,W/2,H*0.45,100);
  aura.addColorStop(0,auraC+'44');aura.addColorStop(1,'transparent');
  c.fillStyle=aura;c.fillRect(0,0,W,H);

  // ── 左エリア：素体（全身）──
  const bp=P[gender];
  const availH=H-24, availW=W*0.62;
  const sc=Math.min(availW/bp.w,availH/bp.h);
  const bw=bp.w*sc,bh=bp.h*sc;
  const bx=(availW-bw)/2, by=(availH-bh)/2;
  c.drawImage(src,bp.x,bp.y,bp.w,bp.h,bx,by,bw,bh);

  // ── 右エリア：パーツアイコン3段 ──
  const rx=W*0.64,rw=W*0.34,rh=(H-24)/3;

  // 髪型アイコン（右上）
  if(chara.hair&&P[chara.hair]){
    const hp=P[chara.hair];
    const hs=Math.min(rw/hp.w,(rh-6)/hp.h);
    const hw=hp.w*hs,hh=hp.h*hs;
    c.drawImage(src,hp.x,hp.y,hp.w,hp.h,rx+(rw-hw)/2,3+(rh-hh)/2,hw,hh);
    // 枠
    c.strokeStyle=auraC+'88';c.lineWidth=1.5;
    c.beginPath();c.roundRect(rx,1,rw,rh-4,4);c.stroke();
    c.fillStyle=auraC+'22';c.beginPath();c.roundRect(rx,1,rw,rh-4,4);c.fill();
  } else {
    c.strokeStyle='rgba(124,58,237,0.25)';c.lineWidth=1;
    c.setLineDash([4,3]);c.beginPath();c.roundRect(rx,1,rw,rh-4,4);c.stroke();c.setLineDash([]);
    c.fillStyle='rgba(167,139,250,0.3)';c.font='10px DotGothic16,sans-serif';c.textAlign='center';
    c.fillText('髪型',rx+rw/2,rh/2+4);
  }

  // 目アイコン（右中）
  const eyeY=rh;
  if(chara.eyes&&P[chara.eyes]){
    const ep=P[chara.eyes];
    const es=Math.min(rw/ep.w,(rh-6)/ep.h);
    const ew=ep.w*es,eh=ep.h*es;
    c.drawImage(src,ep.x,ep.y,ep.w,ep.h,rx+(rw-ew)/2,eyeY+3+(rh-eh)/2,ew,eh);
    c.strokeStyle=auraC+'88';c.lineWidth=1.5;
    c.beginPath();c.roundRect(rx,eyeY+1,rw,rh-4,4);c.stroke();
    c.fillStyle=auraC+'22';c.beginPath();c.roundRect(rx,eyeY+1,rw,rh-4,4);c.fill();
  } else {
    c.strokeStyle='rgba(124,58,237,0.25)';c.lineWidth=1;
    c.setLineDash([4,3]);c.beginPath();c.roundRect(rx,eyeY+1,rw,rh-4,4);c.stroke();c.setLineDash([]);
    c.fillStyle='rgba(167,139,250,0.3)';c.font='10px DotGothic16,sans-serif';c.textAlign='center';
    c.fillText('瞳',rx+rw/2,eyeY+rh/2+4);
  }

  // 制服アイコン（右下）
  const uniY=rh*2;
  const uniKey=(chara.apt||'')+`_${gender}`;
  if(chara.apt&&P[uniKey]){
    const up=P[uniKey];
    const us=Math.min(rw/up.w,(rh-6)/up.h);
    const uw=up.w*us,uh=up.h*us;
    c.drawImage(src,up.x,up.y,up.w,up.h,rx+(rw-uw)/2,uniY+3+(rh-uh)/2,uw,uh);
    c.strokeStyle=auraC+'88';c.lineWidth=1.5;
    c.beginPath();c.roundRect(rx,uniY+1,rw,rh-4,4);c.stroke();
    c.fillStyle=auraC+'22';c.beginPath();c.roundRect(rx,uniY+1,rw,rh-4,4);c.fill();
  } else {
    c.strokeStyle='rgba(124,58,237,0.25)';c.lineWidth=1;
    c.setLineDash([4,3]);c.beginPath();c.roundRect(rx,uniY+1,rw,rh-4,4);c.stroke();c.setLineDash([]);
    c.fillStyle='rgba(167,139,250,0.3)';c.font='10px DotGothic16,sans-serif';c.textAlign='center';
    c.fillText('適性',rx+rw/2,uniY+rh/2+4);
  }

  // ガイドテキスト
  c.textAlign='center';c.font='10px DotGothic16,sans-serif';
  let hint='';
  if(!chara.gender) hint='↓ 素体を選んでください';
  else if(!chara.hair) hint='↓ 髪型を選んでください';
  else if(!chara.eyes) hint='↓ 瞳を選んでください';
  else if(!chara.apt) hint='↓ 適性を選んでください';
  else hint='✦ 創生儀式へ進む準備完了！';
  c.fillStyle='rgba(167,139,250,0.9)';
  c.fillText(hint,W/2,H-6);
}
function startChara(){show('s-chara');setTimeout(drawCharacter,50);}
function pick(key,val,el){
  chara[key]=val;
  // 同じ.choice-row内のsel解除→選択ボタンにsel追加
  const parentRow=el.closest('.choice-row');
  if(parentRow) parentRow.querySelectorAll('.cbtn').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel');
  // 髪型を性別に応じて切り替え
  if(key==='gender'){
    const hairRow=document.getElementById('hair-row');
    const boy=[['tsum','ツンツンヘア'],['mash','マッシュボブ'],['side','七三分け']];
    const girl=[['pony','ポニーテール'],['bob','ボブカット'],['twin','ツインテール']];
    const list=val==='boy'?boy:girl;
    hairRow.innerHTML=list.map(([id,lbl])=>`<button class="cbtn" onclick="pick('hair','${id}',this)">${lbl}</button>`).join('');
    chara.hair='';
    // 創生儀式ボタンは髪型が未選択なので無効化
    const nb=document.getElementById('chara-next');
    nb.style.opacity='0.4';nb.style.pointerEvents='none';
  }
  // 全項目選択されたらボタン有効化
  if(chara.gender&&chara.hair&&chara.eyes&&chara.apt){
    const nb=document.getElementById('chara-next');
    nb.style.opacity='1';nb.style.pointerEvents='auto';
  }
  drawCharacter();
}

// ── 創生儀式 ──
function startRitual(){
  scores={bit:0,rune:0,pop:0,lore:0,neo:0};
  // 適性をスコアに反映
  const sp=APT_SPEC[chara.apt];
  if(sp) scores[sp]+=2;
  qIdx=0;
  show('s-questions');
  showQ();
}
function showQ(){
  const q=QS[qIdx];
  document.getElementById('q-num').textContent='Question '+(qIdx+1)+' / 7';
  document.getElementById('q-text').textContent=q.t;
  const cc=document.getElementById('q-choices');cc.innerHTML='';
  if(q.isName){
    cc.innerHTML='<input class="name-input" id="pname-inp" type="text" maxlength="12" placeholder="あなたの名前..." style="margin:0 auto;display:block">'
      +'<button class="btn btn-gold btn-w" onclick="confirmPName()" style="margin-top:10px">Logに刻む →</button>';
  } else {
    q.cs.forEach(c=>{
      const b=document.createElement('button');b.className='qbtn';b.textContent=c.t;
      b.onclick=()=>{
        Object.entries(c.s).forEach(([k,v])=>scores[k]+=v);
        qIdx++;
        if(qIdx>=QS.length) wo(birthMagit);
        else showQ();
      };
      cc.appendChild(b);
    });
  }
}
function confirmPName(){
  const v=(document.getElementById('pname-inp')||{}).value?.trim();
  if(!v) return;
  playerName=v;
  wo(birthMagit);
}

// ── マギト誕生 ──
function birthMagit(){
  const best=Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];
  mySpecies=SPECIES[best];
  setColor(mySpecies.color);
  document.getElementById('birth-title').textContent=`「${playerName||'君'}」のログから──`;
  document.getElementById('magit-img').src=mySpecies.img;
  document.getElementById('species-name').textContent=`『${mySpecies.name}』が産まれた！`;
  document.getElementById('species-desc').textContent=mySpecies.desc;
  show('s-birth');
}
function confirmName(){
  const v=document.getElementById('name-input').value.trim();
  if(!v) return;
  nickname=v;
  save();
  startQuiz();
}

// ── 保存 ──
function save(){
  const key=Object.keys(SPECIES).find(k=>SPECIES[k]===mySpecies)||'bit';
  localStorage.setItem('magit_data',JSON.stringify({playerName,nickname,species:key,wordCount,words}));
}

// ── クイズ ──
async function startQuiz(){
  document.getElementById('hdr-img').textContent=mySpecies.img.includes('bit')?'🫧':mySpecies.img.includes('rune')?'🍡':mySpecies.img.includes('pop')?'🌟':mySpecies.img.includes('lore')?'🌿':'💜';
  document.getElementById('hdr-name').textContent=nickname;
  setColor(mySpecies.color);
  show('s-quiz');
  try{
    const r=await fetch(SBU+'/rest/v1/quiz_bank?select=questions&bank_key=eq.hunterxhunter',{
      headers:{'apikey':SBK,'Authorization':'Bearer '+SBK}
    });
    const rows=await r.json();
    bank=rows&&rows[0]?shuf(rows[0].questions):[];
  }catch(e){bank=[];}
  loadQ();
}
function loadQ(){
  if(!bank.length){document.getElementById('quiz-q').textContent='問題バンクが空です。クイズ魔道学院FEVERで問題を追加してください。';return;}
  if(bIdx>=bank.length){bIdx=0;shuf(bank);}
  const q=bank[bIdx++];
  document.getElementById('quiz-genre').textContent=q.g||'';
  document.getElementById('quiz-q').textContent=q.q;
  document.getElementById('word-row').innerHTML='';
  const cc=document.getElementById('quiz-choices');cc.innerHTML='';
  const lbls=['Ａ','Ｂ','Ｃ','Ｄ'];
  q.c.forEach((ch,i)=>{
    const b=document.createElement('button');b.className='qc-btn';
    b.textContent=lbls[i]+' '+ch;
    b.onclick=()=>{
      document.querySelectorAll('.qc-btn').forEach(x=>x.style.pointerEvents='none');
      if(i===q.a){
        b.classList.add('correct');
        combo++;wordCount+=combo;
        const w=q.q.replace(/[？?]/g,'').slice(0,8);
        words.unshift(w);if(words.length>6)words.pop();
        document.getElementById('word-row').innerHTML=words.slice(0,4).map(w=>`<span class="word-chip">${w}</span>`).join('');
        showXP('+'+combo+'語！');
      }else{
        b.classList.add('wrong');
        document.querySelectorAll('.qc-btn')[q.a].classList.add('correct');
        combo=1;
      }
      document.getElementById('word-count').textContent=wordCount+'語';
      document.getElementById('combo-disp').textContent='×'+combo;
      save();
    };
    cc.appendChild(b);
  });
}
function nextQ(){loadQ();}
function showXP(msg){
  const el=document.createElement('div');el.className='xp-pop';el.textContent=msg;
  document.body.appendChild(el);setTimeout(()=>el.remove(),1500);
}
function continueGame(){setColor(mySpecies.color);startQuiz();}
function newGame(){localStorage.removeItem('magit_data');location.reload();}

// ── 起動 ──
window.onload=()=>{
  const saved=localStorage.getItem('magit_data');
  if(saved){
    try{
      const d=JSON.parse(saved);
      if(d.species&&SPECIES[d.species]&&d.nickname){
        playerName=d.playerName||'';nickname=d.nickname;
        mySpecies=SPECIES[d.species];wordCount=d.wordCount||0;words=d.words||[];
        // 再訪問時
        document.getElementById('prologue-box').innerHTML='<span class="pline px-text" style="animation-delay:0s">おかえり、'+playerName+'。<br>'+nickname+'('+mySpecies.name+')が待っていたよ。</span>';
        showPrologueBtns(true);
        return;
      }
    }catch(e){}
  }
  showStartBtn();
};
