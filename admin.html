<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>管理者パネル | 百式ゲーム王国</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a14;color:#ccc;font-family:'Segoe UI',sans-serif;min-height:100vh}
.header{background:linear-gradient(90deg,#1a1a2e,#16213e);border-bottom:2px solid #FFD700;padding:14px 20px;display:flex;align-items:center;gap:12px}
.header-title{font-size:20px;font-weight:700;color:#FFD700}
.header-sub{font-size:12px;color:#888}
.logout-btn{margin-left:auto;padding:6px 14px;background:rgba(255,80,80,.15);border:1px solid rgba(255,80,80,.3);color:#ff8888;border-radius:6px;cursor:pointer;font-size:13px}
.container{max-width:900px;margin:0 auto;padding:20px}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:#111;border:1px solid #333;border-radius:14px;padding:36px 32px;width:320px;text-align:center}
.login-logo{font-size:40px;margin-bottom:12px}
.login-title{font-size:18px;font-weight:700;color:#FFD700;margin-bottom:4px}
.login-sub{font-size:12px;color:#666;margin-bottom:24px}
.login-input{width:100%;background:#0a0a0a;border:1px solid #333;border-radius:8px;padding:12px 14px;color:#fff;font-size:16px;text-align:center;letter-spacing:.2em;margin-bottom:12px}
.login-input:focus{outline:none;border-color:#FFD700}
.login-btn{width:100%;padding:12px;background:linear-gradient(180deg,#FFD700,#c88000);border:none;border-radius:8px;color:#000;font-weight:700;font-size:16px;cursor:pointer}
.login-err{color:#ff6666;font-size:13px;margin-top:8px;min-height:20px}
#main-screen{display:none}
.tab-bar{display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid #222;padding-bottom:0}
.tab{padding:10px 18px;cursor:pointer;font-size:14px;font-weight:600;color:#888;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:#FFD700;border-bottom-color:#FFD700}
.tab-panel{display:none}
.tab-panel.active{display:block}
.card{background:#111;border:1px solid #222;border-radius:10px;padding:16px;margin-bottom:14px}
.card-title{font-size:13px;font-weight:700;color:#888;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}
.tbl{width:100%;border-collapse:collapse;font-size:14px}
.tbl th{background:#0a0a0a;color:#888;font-size:11px;letter-spacing:.08em;padding:8px 10px;text-align:left;border-bottom:1px solid #222}
.tbl td{padding:10px;border-bottom:1px solid #1a1a1a;vertical-align:middle}
.tbl tr:hover td{background:rgba(255,255,255,.03)}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700}
.badge-green{background:rgba(0,200,60,.15);color:#00cc44;border:1px solid rgba(0,200,60,.3)}
.badge-gold{background:rgba(255,215,0,.15);color:#FFD700;border:1px solid rgba(255,215,0,.3)}
.inp{background:#0a0a0a;border:1px solid #333;border-radius:6px;padding:8px 10px;color:#fff;font-size:14px;width:100%}
.inp:focus{outline:none;border-color:#FFD700}
.btn{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:700}
.btn-primary{background:linear-gradient(180deg,#00cc44,#009933);color:#fff}
.btn-danger{background:rgba(255,80,80,.15);border:1px solid rgba(255,80,80,.3);color:#ff8888}
.btn-gold{background:linear-gradient(180deg,#FFD700,#c88000);color:#000}
.btn-sm{padding:5px 12px;font-size:12px}
.medal-row{display:flex;gap:8px;align-items:center}
.medal-inp{width:90px}
.status-msg{margin-top:10px;padding:8px 12px;border-radius:6px;font-size:13px;display:none}
.status-msg.ok{display:block;background:rgba(0,200,60,.1);border:1px solid rgba(0,200,60,.3);color:#00cc44}
.status-msg.err{display:block;background:rgba(255,80,80,.1);border:1px solid rgba(255,80,80,.3);color:#ff8888}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.stat-box{background:#0a0a0a;border:1px solid #222;border-radius:8px;padding:12px;text-align:center}
.stat-n{font-size:28px;font-weight:700;color:#FFD700;font-family:Oswald,sans-serif}
.stat-l{font-size:11px;color:#666;margin-top:2px}
.loading{color:#888;font-size:13px;padding:20px;text-align:center}
.reset-section{border-top:1px solid #222;margin-top:16px;padding-top:16px}
</style>
</head>
<body>

<!-- ログイン画面 -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🔑</div>
    <div class="login-title">管理者パネル</div>
    <div class="login-sub">百式ゲーム王国</div>
    <input class="login-input" id="pw-input" type="password" placeholder="パスワード" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">ログイン</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- メイン画面 -->
<div id="main-screen">
  <div class="header">
    <div>
      <div class="header-title">🔑 管理者パネル</div>
      <div class="header-sub">百式ゲーム王国</div>
    </div>
    <button class="logout-btn" onclick="doLogout()">ログアウト</button>
  </div>
  <div class="container">
    <div class="tab-bar">
      <div class="tab active" onclick="switchTab('users',this)">👤 ユーザー管理</div>
      <div class="tab" onclick="switchTab('rankings',this)">🏆 ランキング</div>
      <div class="tab" onclick="switchTab('stats',this)">📊 統計</div>
    </div>

    <!-- ユーザー管理 -->
    <div class="tab-panel active" id="tab-users">
      <div class="card">
        <div class="card-title">ユーザー一覧</div>
        <div id="users-list" class="loading">読み込み中...</div>
      </div>
      <div class="card">
        <div class="card-title">メダル追加 / 新規ユーザー作成</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div>
            <label style="font-size:12px;color:#888;display:block;margin-bottom:4px">ユーザー選択</label>
            <select class="inp" id="target-user" style="width:100%"><option value="">-- 選択 --</option></select>
          </div>
          <div>
            <label style="font-size:12px;color:#888;display:block;margin-bottom:4px">メダル操作数</label>
            <div class="medal-row">
              <input class="inp medal-inp" id="medal-amount" type="number" value="100" min="1">
              <button class="btn btn-gold" onclick="addMedals()">追加</button>
              <button class="btn btn-danger btn-sm" onclick="setMedals()">セット</button>
            </div>
          </div>
        </div>
        <div class="status-msg" id="medal-status"></div>
        <div style="border-top:1px solid #222;margin-top:16px;padding-top:14px">
          <div style="font-size:12px;color:#888;margin-bottom:8px">新規ユーザー作成</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <input class="inp" id="new-name" placeholder="名前" style="width:130px">
            <input class="inp" id="new-pin" placeholder="PIN (4桁)" maxlength="4" style="width:100px">
            <input class="inp" id="new-medals" type="number" value="100" placeholder="初期メダル" style="width:110px">
            <button class="btn btn-primary" onclick="createUser()">作成</button>
          </div>
          <div class="status-msg" id="create-status"></div>
        </div>
      </div>
    </div>

    <!-- ランキング -->
    <div class="tab-panel" id="tab-rankings">

  <!-- ポーカーランキング -->
  <div class="card">
    <div class="card-title">🎴 ポーカー FEVER ランキング</div>
    <div id="rank-list-poker" style="min-height:40px"></div>
    <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-danger btn-sm" onclick="resetTable('poker_scores','ポーカー全件')">🗑 全件削除</button>
    </div>
    <div id="msg-poker" class="status-msg"></div>
  </div>

  <!-- クイズランキング -->
  <div class="card">
    <div class="card-title">🧙 クイズ FEVER ランキング</div>
    <div id="rank-list-quiz" style="min-height:40px"></div>
    <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-danger btn-sm" onclick="resetTable('quiz_fever_scores','クイズ全件')">🗑 全件削除</button>
    </div>
    <div id="msg-quiz" class="status-msg"></div>
  </div>

  <!-- じゃんけんランキング -->
  <div class="card">
    <div class="card-title">✊ グーチョキパー FEVER ランキング</div>
    <div id="rank-list-jk" style="min-height:40px"></div>
    <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-danger btn-sm" onclick="resetTable('rankings','じゃんけん全件')">🗑 全件削除</button>
    </div>
    <div id="msg-jk" class="status-msg"></div>
  </div>

</div>
<div class="tab-panel" id="tab-stats">
      <div class="card">
        <div class="card-title">現状統計</div>
        <div class="stat-grid" id="stat-grid">
          <div class="stat-box"><div class="stat-n" id="stat-users">-</div><div class="stat-l">登録ユーザー数</div></div>
          <div class="stat-box"><div class="stat-n" id="stat-medals">-</div><div class="stat-l">総メダル流通数</div></div>
          <div class="stat-box"><div class="stat-n" id="stat-ranks">-</div><div class="stat-l">ランキング件数</div></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const SB='https://gtzfcoiowdnyjvwikxku.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd0emZjb2lvd2RueWp2d2lreGt1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1ODk3MTksImV4cCI6MjA5MDE2NTcxOX0.aET6tP6-JUyRuwFOrPa-xn0RofVX4o3gRCPBm13Dbvg';
const H={'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Accept':'application/json'};
const ADMIN_PW='hyaku2025admin';

let _users=[];

function sbFetch(path,opts){
  return fetch(SB+'/rest/v1/'+path,{headers:{...H,...(opts&&opts.headers?opts.headers:{})},method:opts&&opts.method||'GET',body:opts&&opts.body}).then(r=>{if(!r.ok&&r.status!==204)throw r.status;return r.status===204?null:r.json();});
}

function doLogin(){
  const pw=document.getElementById('pw-input').value;
  if(pw===ADMIN_PW){
    sessionStorage.setItem('admin_ok','1');
    document.getElementById('login-screen').style.display='none';
    document.getElementById('main-screen').style.display='block';
    loadAll();
  }else{
    document.getElementById('login-err').textContent='パスワードが正しくありません';
    document.getElementById('pw-input').value='';
  }
}
function doLogout(){sessionStorage.removeItem('admin_ok');location.reload();}

function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  if(el) el.classList.add('active');
  var panel = document.getElementById('tab-'+name);
  if(panel) { panel.classList.add('active'); }
  if(name==='rankings') { loadRankings(); }
  if(name==='stats') { try{loadStats();}catch(e){} }
}

function showMsg(id,msg,ok){
  const el=document.getElementById(id);
  el.textContent=msg;el.className='status-msg '+(ok?'ok':'err');
  setTimeout(()=>{el.className='status-msg';},3500);
}

async function loadAll(){
  await loadUsers();
  loadStats();
}

async function loadUsers(){
  const el=document.getElementById('users-list');
  try{
    const all=await sbFetch('game_users?select=*&order=created_at.asc');
    // _del_プレフィックスを除外
    window._users=(all||[]).filter(u=>!u.name.startsWith('_del_'));
    const sel=document.getElementById('target-user');
    sel.innerHTML='<option value="">-- 選択 --</option>';
    window._users.forEach(u=>{const o=document.createElement('option');o.value=u.id;o.textContent=u.name+' (現在'+u.medals+'枚)';sel.appendChild(o);});
    if(!window._users.length){el.innerHTML='<div class="loading">ユーザーなし</div>';return;}
    el.innerHTML=`<table class="tbl">
      <tr><th>ID</th><th>名前</th><th>PIN</th><th>メダル</th><th>登録日</th><th>操作</th></tr>
      ${window._users.map(u=>`<tr>
        <td><span class="badge badge-gold">#${u.id}</span></td>
        <td><b style="color:#fff">${esc(u.name)}</b></td>
        <td><span style="color:#666;font-family:monospace">${u.pin||'-'}</span></td>
        <td><span class="badge badge-green">🪙 ${u.medals}枚</span></td>
        <td style="color:#666;font-size:12px">${new Date(u.created_at).toLocaleDateString('ja-JP')}</td>
        <td><button class="btn btn-danger btn-sm" onclick="deleteUser(${u.id},'${esc(u.name)}')">無効化</button></td>
      </tr>`).join('')}
    </table>`;
  }catch(e){el.innerHTML='<div class="loading" style="color:#f88">取得エラー</div>';}
}

async function addMedals(){
  const uid=document.getElementById('target-user').value;
  const amt=parseInt(document.getElementById('medal-amount').value)||0;
  if(!uid){showMsg('medal-status','ユーザーを選んでください',false);return;}
  if(amt<=0){showMsg('medal-status','枚数を正しく入力してください',false);return;}
  const user=window._users.find(u=>String(u.id)===uid);
  if(!user)return;
  const newMedals=(user.medals||0)+amt;
  try{
    await sbFetch('game_users?id=eq.'+uid,{method:'PATCH',headers:{'Prefer':'return=minimal'},body:JSON.stringify({medals:newMedals})});
    showMsg('medal-status',user.name+'に'+amt+'枚追加 → 計'+newMedals+'枚',true);
    loadUsers();
  }catch(e){showMsg('medal-status','エラーが発生しました',false);}
}

async function setMedals(){
  const uid=document.getElementById('target-user').value;
  const amt=parseInt(document.getElementById('medal-amount').value);
  if(!uid){showMsg('medal-status','ユーザーを選んでください',false);return;}
  if(isNaN(amt)||amt<0){showMsg('medal-status','枚数を入力してください',false);return;}
  const user=window._users.find(u=>String(u.id)===uid);
  if(!user)return;
  if(!confirm(user.name+'のメダルを'+amt+'枚にセットしますか？'))return;
  try{
    await sbFetch('game_users?id=eq.'+uid,{method:'PATCH',headers:{'Prefer':'return=minimal'},body:JSON.stringify({medals:amt})});
    showMsg('medal-status',user.name+'のメダルを'+amt+'枚にセット完了',true);
    loadUsers();
  }catch(e){showMsg('medal-status','エラーが発生しました',false);}
}

async function createUser(){
  const name=document.getElementById('new-name').value.trim();
  const pin=document.getElementById('new-pin').value.trim();
  const medals=parseInt(document.getElementById('new-medals').value)||0;
  if(!name||!pin){showMsg('create-status','名前とPINを入力してください',false);return;}
  if(pin.length!==4){showMsg('create-status','PINは4桁で入力してください',false);return;}
  try{
    await sbFetch('game_users',{method:'POST',headers:{'Prefer':'return=minimal'},body:JSON.stringify({name,pin,medals})});
    showMsg('create-status',name+'を作成しました（'+medals+'枚）',true);
    document.getElementById('new-name').value='';
    document.getElementById('new-pin').value='';
    loadUsers();
  }catch(e){showMsg('create-status','作成エラー（名前重複の可能性）',false);}
}

async function deleteUser(id,name){
  if(!confirm(name+'を無効化しますか？\n※物理削除はSupabaseから行ってください'))return;
  try{
    await sbFetch('game_users?id=eq.'+id,{method:'PATCH',headers:{'Prefer':'return=minimal'},body:JSON.stringify({name:'_del_'+id,medals:0,pin:'0000'})});
    showMsg('medal-status',name+'を無効化しました',true);
    loadUsers();
  }catch(e){showMsg('medal-status','エラー: '+e,false);}
}


function loadAdminRankings(){ loadRankings(); }

async function loadRankings() {
  var SBU = 'https://gtzfcoiowdnyjvwikxku.supabase.co';
  var SK = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd0emZjb2lvd2RueWp2d2lreGt1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1ODk3MTksImV4cCI6MjA5MDE2NTcxOX0.aET6tP6-JUyRuwFOrPa-xn0RofVX4o3gRCPBm13Dbvg';
  var H = {apikey: SK, 'Authorization': 'Bearer ' + SK};
  var cfgs = [
    {url:SBU+'/rest/v1/poker_scores?select=id,player_name,medal_won&order=medal_won.desc&limit=20',el:'rank-list-poker',col:'medal_won',unit:'枚',nm:'player_name',tbl:'poker_scores'},
    {url:SBU+'/rest/v1/quiz_fever_scores?select=id,player_name,score&order=score.desc&limit=20',el:'rank-list-quiz',col:'score',unit:'問',nm:'player_name',tbl:'quiz_fever_scores'},
    {url:SBU+'/rest/v1/rankings?select=id,name,score&game=eq.janken&order=score.desc&limit=20',el:'rank-list-jk',col:'score',unit:'枚',nm:'name',tbl:'rankings'}
  ];
  cfgs.forEach(function(cfg) {
    var el = document.getElementById(cfg.el);
    if (!el) return;
    el.innerHTML = '<div style="color:#aaa;padding:8px">読込中...</div>';
    fetch(cfg.url, {headers:H})
      .then(function(r){return r.json();})
      .then(function(d){
        if (!el) return;
        if (!Array.isArray(d)||!d.length){el.innerHTML='<div style="color:#888;padding:8px">データなし</div>';return;}
        var html='';
        for(var i=0;i<d.length;i++){
          var r=d[i]; var nm=r[cfg.nm]||''; var val=r[cfg.col]||0;
          html+='<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.06)">';
          html+='<span style="color:#ffd700;min-width:22px">'+(i+1)+'</span>';
          html+='<span style="flex:1">'+nm+'</span>';
          html+='<span style="color:#39ff14;min-width:60px;text-align:right">'+val.toLocaleString()+cfg.unit+'</span>';
          html+='<button class="del-btn" data-tbl="'+cfg.tbl+'" data-id="'+r.id+'" data-nm="'+nm+'" style="background:rgba(220,40,40,.8);border:none;color:#fff;padding:2px 8px;border-radius:3px;cursor:pointer;font-size:11px">削除</button>';
          html+='</div>';
        }
        el.innerHTML=html;
      })
      .catch(function(){if(el)el.innerHTML='<div style="color:#f66">取得エラー</div>';});
  });
}

async function resetTable(table, label) {
  var SBU = 'https://gtzfcoiowdnyjvwikxku.supabase.co';
  var SK = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd0emZjb2lvd2RueWp2d2lreGt1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1ODk3MTksImV4cCI6MjA5MDE2NTcxOX0.aET6tP6-JUyRuwFOrPa-xn0RofVX4o3gRCPBm13Dbvg';
  if (!confirm(label+'を全件削除しますか？この操作は元に戻せません。')) return;
  var msgId = table==='poker_scores'?'msg-poker':table==='quiz_fever_scores'?'msg-quiz':'msg-jk';
  var el = document.getElementById(msgId);
  if(el){el.textContent='削除中...';el.style.color='#ffd040';}
  try{
    var H = {apikey:SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=minimal'};
    var r = await fetch(SBU+'/rest/v1/'+table+'?id=gte.0',{method:'DELETE',headers:H});
    if(r.ok||r.status===204){
      if(el){el.textContent='✓ 削除完了';el.style.color='#60ffa0';}
      setTimeout(function(){if(el)el.textContent='';},3000);
      loadRankings();
    }else{var t=await r.text();if(el){el.textContent='エラー('+r.status+'): '+t.slice(0,60);el.style.color='#ff6060';}}
  }catch(e){if(el){el.textContent='エラー: '+e.message;el.style.color='#ff6060';}}
}

async function deleteEntry(table, id, label) {
  var SBU = 'https://gtzfcoiowdnyjvwikxku.supabase.co';
  var SK = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd0emZjb2lvd2RueWp2d2lreGt1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1ODk3MTksImV4cCI6MjA5MDE2NTcxOX0.aET6tP6-JUyRuwFOrPa-xn0RofVX4o3gRCPBm13Dbvg';
  if (!confirm(label+'を削除しますか？')) return;
  var H = {apikey:SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=minimal'};
  try{
    var r = await fetch(SBU+'/rest/v1/'+table+'?id=eq.'+id,{method:'DELETE',headers:H});
    if(r.ok||r.status===204){loadRankings();}
    else{var t=await r.text();alert('削除エラー('+r.status+'): '+t.slice(0,60));}
  }catch(e){alert('エラー: '+e.message);}
}

function loadStats(){}

// 削除ボタンのイベント委譲
document.addEventListener('click',function(e){
