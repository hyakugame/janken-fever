<head>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#050810;color:#eee;font-family:'Barlow Condensed',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;min-height:100dvh;background-image:linear-gradient(rgba(0,200,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,255,.03) 1px,transparent 1px),radial-gradient(ellipse at 20% 30%,rgba(0,100,255,.05) 0,transparent 60%),radial-gradient(ellipse at 80% 70%,rgba(120,0,255,.05) 0,transparent 60%);background-size:40px 40px,40px 40px,100% 100%,100% 100%}

/* ===== ログイン ===== */
#login{width:100%;max-width:380px;padding:24px 20px;display:flex;flex-direction:column;align-items:center}
.logo-en{font-size:11px;letter-spacing:.3em;color:rgba(0,200,255,.5);margin-bottom:4px}
.logo-jp{filter:drop-shadow(0 0 8px rgba(0,200,255,1)) drop-shadow(0 0 24px rgba(0,180,255,.9)) drop-shadow(0 0 48px rgba(0,150,255,.6));text-shadow:0 0 10px rgba(0,240,255,1),0 0 30px rgba(0,200,255,.9),0 0 60px rgba(0,150,255,.6),0 0 100px rgba(0,100,255,.3)}
.logo-sub{font-size:10px;color:rgba(255,255,255,.25);letter-spacing:.2em;margin-bottom:24px}
.box{width:100%;background:linear-gradient(135deg,rgba(0,20,40,.9),rgba(0,10,25,.95));border:1px solid rgba(0,200,255,.2);border-radius:14px;padding:22px 20px;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.box-title{font-size:14px;color:#88ddff;letter-spacing:.08em;text-align:center;margin-bottom:4px}
.box-hint{font-size:11px;color:rgba(255,255,255,.25);text-align:center;margin-bottom:16px}
.nf{width:100%;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:10px 12px;font-size:17px;font-weight:700;color:#fff;outline:none;margin-bottom:16px;font-family:'Barlow Condensed',sans-serif}
.nf::placeholder{color:rgba(255,255,255,.2)}
.nf:focus{border-color:rgba(0,200,255,.4)}
.dots{display:flex;justify-content:center;gap:14px;margin-bottom:16px}.dot{width:52px;height:52px;border-radius:50%;background:radial-gradient(circle at 35% 35%,rgba(40,60,110,.95),rgba(8,12,30,.98));border:1.5px solid rgba(60,100,180,.3);box-shadow:inset 0 2px 5px rgba(255,255,255,.12),inset 0 -2px 5px rgba(0,0,0,.7),0 2px 10px rgba(0,0,0,.6),0 0 0 1px rgba(0,80,180,.08);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:transparent;transition:all .25s ease;position:relative;overflow:hidden}.dot::before{content:'';position:absolute;top:8%;left:15%;width:38%;height:28%;background:linear-gradient(135deg,rgba(255,255,255,.2),rgba(255,255,255,.03));border-radius:50%;filter:blur(1.5px)}.dot.on{background:radial-gradient(circle at 35% 35%,rgba(0,160,255,.65),rgba(0,60,180,.92));border-color:rgba(0,210,255,.85);box-shadow:inset 0 2px 8px rgba(0,220,255,.35),inset 0 -2px 5px rgba(0,0,0,.3),0 0 18px rgba(0,200,255,.95),0 0 36px rgba(0,150,255,.65),0 0 54px rgba(0,100,255,.35),0 0 0 1.5px rgba(0,200,255,.55)}
.pb:active{transform:scale(.94)}
.pb.del{font-size:14px;color:rgba(255,255,255,.5)}
@keyframes okGlow{0%,100%{box-shadow:0 0 20px rgba(0,220,255,1),0 0 40px rgba(0,180,255,.85),0 0 80px rgba(0,150,255,.5);filter:brightness(1.25)}50%{box-shadow:0 0 30px rgba(0,240,255,1),0 0 60px rgba(0,200,255,1),0 0 100px rgba(0,150,255,.7),0 0 140px rgba(0,100,255,.35);filter:brightness(1.65) drop-shadow(0 0 18px rgba(0,230,255,.9))}}.pb.ok{background:linear-gradient(135deg,#0088cc,#0055aa);font-size:16px;box-shadow:0 3px 0 #003366;transition:opacity .2s}.pb.ok[disabled]{opacity:.4;pointer-events:none;filter:grayscale(.4);animation:none !important}.pb.ok:not([disabled]){animation:okGlow .9s ease infinite;background:linear-gradient(135deg,#00ccff,#0055ee)}
.pb.ok:active{transform:translateY(2px);box-shadow:0 1px 0 #003366}
.pb.ok:disabled{background:rgba(40,50,70,.6);color:rgba(255,255,255,.25);box-shadow:none;cursor:not-allowed}
.lmsg{text-align:center;font-size:12px;font-weight:700;min-height:20px;color:#aaa}
.lmsg.err{color:#ff6666}.lmsg.ok{color:#44ff88}
.gbtn{width:100%;padding:10px;margin-top:12px;border:1px solid rgba(255,255,255,.12);border-radius:8px;background:transparent;cursor:pointer;font-size:13px;font-weight:700;color:rgba(255,255,255,.4);font-family:'Barlow Condensed',sans-serif}
.gbtn:hover{color:rgba(255,255,255,.7);border-color:rgba(255,255,255,.3)}

/* ===== ロビー ===== */

/* ヘッダー */
.hdr{padding:12px 16px;background:rgba(0,0,0,.5);border-bottom:1px solid rgba(0,200,255,.12);display:flex;align-items:center;gap:12px}

/* デイリーボーナス */

.bonus-bar:hover{border-color:rgba(255,180,0,.6);background:linear-gradient(135deg,rgba(255,180,0,.2),rgba(255,120,0,.12))}

/* ゲームリスト */
.lobby-body{padding:12px 16px 16px}

.card{display:block;text-decoration:none;background:linear-gradient(135deg,rgba(0,20,40,.9),rgba(0,10,25,.95));border:1px solid rgba(255,255,255,.08);border-radius:14px;overflow:hidden;margin-bottom:12px;position:relative;transition:all .2s}
.card:hover{border-color:rgba(0,200,255,.3);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.card:active{transform:none}.icon-edit-btn{position:absolute;top:6px;right:6px;z-index:10;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer;opacity:0;transition:.2s;-webkit-tap-highlight-color:transparent}.card:hover .icon-edit-btn,.card:active .icon-edit-btn{opacity:1}
.banner{height:140px;display:flex;align-items:center;justify-content:center;font-size:64px;letter-spacing:4px;position:relative;overflow:hidden}.banner img.custom-icon{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}.banner .emoji-wrap{position:relative;z-index:1}

.cname small{font-family:'Noto Sans JP',sans-serif;font-size:11px;color:rgba(255,255,255,.4);font-weight:400;margin-left:8px}
.cdesc{font-size:12px;color:rgba(255,255,255,.35)}
.badge{position:absolute;top:10px;right:10px;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700}
.bnew{background:rgba(255,80,80,.8);color:#fff}
.bhot{background:rgba(255,150,0,.8);color:#fff}
.foot{padding:12px;text-align:center;font-size:10px;color:rgba(255,255,255,.12)}

/* トースト */
.toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.9);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;color:#fff;pointer-events:none;z-index:999;opacity:0;transition:opacity .3s;white-space:nowrap}
.toast.show{opacity:1}

.ranking-section{padding:0 12px 16px;display:flex;flex-direction:column;gap:12px}
.rank-section-title{font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;color:#FFD700;text-align:center;padding:10px 0;border-bottom:1px solid rgba(255,215,0,.3);margin-bottom:4px}
.rank-block{background:rgba(0,0,0,.35);border:1px solid rgba(0,200,60,.25);border-radius:12px;padding:12px}
.rank-block-title{font-family:'Oswald',sans-serif;font-size:15px;font-weight:700;color:#00FF41;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid rgba(0,200,60,.2)}
.rank-list{display:flex;flex-direction:column;gap:4px;font-size:14px}
.rank-row{display:flex;align-items:center;gap:8px;padding:5px 4px;border-bottom:1px solid rgba(255,255,255,.05)}
.rank-row:last-child{border:none}
.rank-pos{font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;color:#FFD700;min-width:24px}
.rank-name{flex:1;color:#ccc}
.rank-score{font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;color:#00FF41}
.pb-ok[disabled]{opacity:.45 !important;pointer-events:none !important;filter:none !important;animation:none !important}
.pb-ok[disabled]{opacity:.45 !important;pointer-events:none !important;filter:none !important;animation:none !important}

@keyframes dotGlowV6{0%,100%{box-shadow:inset 0 3px 8px rgba(0,240,255,.38),inset 0 -3px 6px rgba(0,0,0,.38),0 0 18px rgba(0,200,255,1),0 0 36px rgba(0,160,255,.80),0 0 54px rgba(0,120,255,.50),0 0 0 2px rgba(0,220,255,.58)}50%{box-shadow:inset 0 3px 10px rgba(0,240,255,.52),inset 0 -3px 6px rgba(0,0,0,.32),0 0 26px rgba(0,220,255,1),0 0 52px rgba(0,180,255,.90),0 0 78px rgba(0,140,255,.60),0 0 0 2.5px rgba(0,240,255,.78)}}
.dot.on{background:radial-gradient(circle at 35% 32%,rgba(0,195,255,.82) 0%,rgba(0,75,215,.92) 50%,rgba(0,25,115,.97) 100%) !important;border-color:rgba(0,215,255,.92) !important;animation:dotGlowV6 .9s ease infinite !important}
.logo-jp{filter:drop-shadow(0 0 6px rgba(0,220,255,1)) drop-shadow(0 0 18px rgba(0,180,255,.95)) drop-shadow(0 0 36px rgba(0,150,255,.75)) !important;text-shadow:0 0 8px rgba(0,255,255,1),0 0 20px rgba(0,220,255,.95),0 0 40px rgba(0,180,255,.8),0 0 70px rgba(0,150,255,.55) !important}

.pb-ok:not([disabled]){animation:okV6 1.1s ease infinite !important}

<!-- ロビー -->
<script>
var user=null;
// PINログイン機能

var user=null;


function openLobby(){location.replace("lobby.html");}
function openLogin(){
  document.getElementById('login').style.display='flex';
  document.getElementById('lobby').style.display='none';
}

// PIN
var pin='';
function pi(n){if(pin.length>=4)return;pin+=n;upd();if(pin.length===4)document.getElementById('ok').disabled=false;}
function pd(){pin=pin.slice(0,-1);upd();document.getElementById('ok').disabled=true;}
function upd(){const n=pin.length;for(let i=0;i<4;i++){const d=document.getElementById('d'+i);if(i<n){if(!d.classList.contains('on')){d.classList.add('on');d.style.animation='none';requestAnimationFrame(()=>{requestAnimationFrame(()=>{d.style.animation='dotPop .35s cubic-bezier(.36,2,.6,1) forwards';});});}}else{d.classList.remove('on');d.style.animation='none';}}document.getElementById('ok').disabled=n<4;}

// ゲームへ
function go(e,href){e.preventDefault();save();location.href=href;}

// ページ戻り時
window.addEventListener('pageshow',function(){
  try{
    var s=JSON.parse(localStorage.getItem('hkg_user')||'null');
    if(s&&user&&s.name===user.name){
      user=s;
      document.getElementById('mc').textContent='🪙 '+String(user.medals||0).padStart(5,'0');
    }
  }catch(e){}
});

// ===== デイリーボーナス =====
function checkBonus(){
  var today=new Date().toDateString();
  var lastBonus=localStorage.getItem('hkg_daily_bonus');
  var bar=document.getElementById('bonusBar');
  var badge=document.getElementById('bonusBadge');
  var sub=document.getElementById('bonusSub');
  if(lastBonus===today){
    bar.classList.add('got');
    badge.classList.add('done');
    badge.textContent='受取済';
    sub.textContent='また明日来てね！';
  }else{
    bar.classList.remove('got');
    badge.classList.remove('done');
    badge.textContent='+50枚';
    sub.textContent='タップして50枚もらおう！';
  }
}

function claimBonus(){
  var today=new Date().toDateString();
  var lastBonus=localStorage.getItem('hkg_daily_bonus');
  if(lastBonus===today){toast('今日はもう受け取り済みです！');return;}
  user.medals=(user.medals||0)+50;
  save();
  localStorage.setItem('hkg_daily_bonus',today);
  document.getElementById('mc').textContent='🪙 '+String(user.medals).padStart(5,'0');
  checkBonus();
  toast('🎁 デイリーボーナス +50枚！');
}

// ===== DB =====
function getDB(){try{return JSON.parse(localStorage.getItem('hkg_db')||'{}');}catch(e){return {};}}
function saveDB(db){try{localStorage.setItem('hkg_db',JSON.stringify(db));}catch(e){}}
function guest() {
  // ゲストプレイ: localStorageに仮ユーザーをセットしてロビーへ
  var existing = null;
  try { existing = JSON.parse(localStorage.getItem('hkg_user') || 'null'); } catch(e){}
  // 既にGUESTデータがあればそのメダル数を引き継ぐ、なければ200枚
  var medals = (existing && existing.name === 'GUEST' && typeof existing.medals === 'number')
    ? existing.medals : 200;
  var u = {id: null, name: 'GUEST', medals: medals, pin: null};
  try { localStorage.setItem('hkg_user', JSON.stringify(u)); } catch(e){}
  setTimeout(function(){ location.replace('lobby.html'); }, 100);
}

function save(){
  try{localStorage.setItem('hkg_user',JSON.stringify(user));}catch(e){}
  if(user&&user.name&&user.name!=='GUEST'){
    var db=getDB();if(db[user.name])db[user.name].medals=user.medals;saveDB(db);
  }
}
function msg(t,c){var e=document.getElementById('lmsg');e.textContent=t;e.className='lmsg'+(c?' '+c:'');}
var _tt;
function toast(m){clearTimeout(_tt);var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');_tt=setTimeout(function(){t.classList.remove('show');},2500);}

// ══ アイコンカスタマイズ ══
const ICON_KEYS = {slot:'lobby_icon_slot',jk:'lobby_icon_jk',poker:'lobby_icon_poker',quiz:'lobby_icon_quiz'};
function loadCustomIcons() {
  Object.entries(ICON_KEYS).forEach(([id, key]) => {
    const img = localStorage.getItem(key);
    if(img) applyIcon(id, img);
  });
}
function applyIcon(id, dataUrl) {
  const banner = document.getElementById('banner-'+id);
  if(!banner) return;
  let imgEl = banner.querySelector('img.custom-icon');
  if(!imgEl) { imgEl = document.createElement('img'); imgEl.className='custom-icon'; banner.prepend(imgEl); }
  imgEl.src = dataUrl;
}
function editIcon(id, e) {
  e.preventDefault(); e.stopPropagation();
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'image/*';
  inp.onchange = ev => {
    const file = ev.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = re => {
      const dataUrl = re.result;
      localStorage.setItem(ICON_KEYS[id], dataUrl);
      applyIcon(id, dataUrl);
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}
function resetIcon(id) {
  localStorage.removeItem(ICON_KEYS[id]);
  const banner = document.getElementById('banner-'+id);
  if(!banner) return;
  const imgEl = banner.querySelector('img.custom-icon');
  if(imgEl) imgEl.remove();
}
// 長押しでリセット
document.addEventListener('DOMContentLoaded', () => {
  loadCustomIcons();
  Object.keys(ICON_KEYS).forEach(id => {
    const banner = document.getElementById('banner-'+id);
    if(!banner) return;
    let pressTimer;
    banner.addEventListener('touchstart', () => { pressTimer = setTimeout(() => { if(confirm(id+'のアイコンをリセットしますか？')) resetIcon(id); }, 800); });
    banner.addEventListener('touchend', () => clearTimeout(pressTimer));
  });
});

async function doLogin(){
  const name=document.getElementById('nf').value.trim();
  if(!name){msg('なまえを入力してください','err');return;}
  if(pin.length<4){msg('4桁のPINを入力してください','err');return;}
  msg('認証中...','');

  // Supabaseからname+pinで検索
  try{
    const res=await fetch(`${SB}/rest/v1/game_users?name=eq.${encodeURIComponent(name)}&pin=eq.${pin}`,{headers:SH});
    const data=await res.json();
    if(data&&data.length>0){
      // 既存ユーザー
      user={id:data[0].id,name:data[0].name,medals:(()=>{try{var _ls=JSON.parse(localStorage.getItem('hkg_user')||'null');return(_ls&&_ls.name===data[0].name&&typeof _ls.medals==='number')?_ls.medals:data[0].medals;}catch(e){return data[0].medals;}})(),pin};
      msg('ログイン成功！','ok');
      save();
      setTimeout(()=>location.replace('lobby.html'),300);
    }else{
      // 新規 or PIN違い → nameだけで検索
      const res2=await fetch(`${SB}/rest/v1/game_users?name=eq.${encodeURIComponent(name)}`,{headers:SH});
      const data2=await res2.json();
      if(data2&&data2.length>0){
        msg('PINが違います','err');
      }else{
        // 新規登録
        await createUser(name,pin);
      }
    }
  }catch(e){
    // Supabase失敗 → ローカルのみで動作
    user={id:null,name,medals:(()=>{try{var _ls=JSON.parse(localStorage.getItem('hkg_user')||'null');return(_ls&&_ls.name===name&&typeof _ls.medals==='number')?_ls.medals:200;}catch(e){return 200;}})(),pin};
    save();
    setTimeout(()=>location.replace('lobby.html'),300);
  }
}

async function doLogout(){
  // Supabaseにメダルを保存してからログアウト
  const u=JSON.parse(localStorage.getItem('hkg_user')||'{}');
  if(u.name&&u.name!=='GUEST'&&u.medals!==undefined){
    const SBU='https://gtzfcoiowdnyjvwikxku.supabase.co';
    const SBK=document.querySelector('script').textContent.match(/SBK='([^']+)'/)?.[1]||'';
    if(SBK){
      const headers={'apikey':SBK,'Authorization':'Bearer '+SBK,'Content-Type':'application/json'};
      try{
        if(u.id){
          await fetch(SBU+'/rest/v1/game_users?id=eq.'+u.id,{method:'PATCH',headers,body:JSON.stringify({medals:u.medals})});
        } else {
          const rows=await fetch(SBU+'/rest/v1/game_users?name=eq.'+encodeURIComponent(u.name),{headers}).then(r=>r.json());
          if(rows&&rows[0]) await fetch(SBU+'/rest/v1/game_users?id=eq.'+rows[0].id,{method:'PATCH',headers,body:JSON.stringify({medals:u.medals})});
        }
      }catch(e){}
    }
  }
  localStorage.removeItem('hkg_user');
  openLogin();
}
