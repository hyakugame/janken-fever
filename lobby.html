<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ゲーム王国</title>
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Noto+Sans+JP:wght@400;700;900&family=Zen+Dots&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--gold:#ffd700;--bg-deep:#050818;}
body{background:#050818;min-height:100vh;font-family:'Noto Sans JP',sans-serif;color:#eef;overflow-x:hidden;position:relative;display:flex;flex-direction:column;align-items:center;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(20,10,80,.9) 0%,transparent 70%),radial-gradient(ellipse 50% 40% at 85% 100%,rgba(60,0,100,.5) 0%,transparent 60%),linear-gradient(180deg,#050818 0%,#080d25 50%,#0a0520 100%);z-index:0;pointer-events:none;}
.stars{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.stars span{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--d,3s) infinite alternate ease-in-out;}
@keyframes twinkle{0%{opacity:.1;transform:scale(.8);}100%{opacity:.9;transform:scale(1.2);}}
#lobby{position:relative;z-index:1;max-width:480px;width:100%;min-height:100vh;padding-bottom:40px;display:block !important;}
.hdr{display:flex;align-items:center;gap:10px;padding:14px 16px 10px;background:linear-gradient(180deg,rgba(10,5,40,.97) 0%,rgba(5,8,24,.7) 100%);position:sticky;top:0;z-index:100;backdrop-filter:blur(14px);border-bottom:1px solid rgba(180,100,255,.2);width:100%;}
.avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#b44fff,#6633cc);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;color:#fff;flex-shrink:0;box-shadow:0 0 0 2px rgba(180,100,255,.5),0 0 16px rgba(180,100,255,.4);}
.hdr-info{display:flex;flex-direction:column;gap:1px;flex:1;}
.hdr-name{font-size:13px;font-weight:700;color:#ddd;}
.hdr-medals{font-family:'Zen Dots',monospace;font-size:20px;font-weight:700;color:var(--gold);text-shadow:0 0 10px rgba(255,200,0,.6),0 0 30px rgba(255,150,0,.3);}
.hdr-medals::before{content:'🪙 ';}
.lout{background:rgba(255,255,255,.06);border:1px solid rgba(255,100,150,.3);color:rgba(255,150,180,.8);padding:6px 12px;border-radius:20px;font-size:11px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .2s;white-space:nowrap;}
.lout:hover{background:rgba(255,50,100,.15);border-color:rgba(255,100,150,.6);}
.bonus-bar{margin:10px 14px;padding:12px 16px;border-radius:14px;cursor:pointer;position:relative;overflow:hidden;display:flex;align-items:center;gap:12px;border:2px solid transparent;background:linear-gradient(rgba(10,8,30,.95),rgba(10,8,30,.95)) padding-box,linear-gradient(135deg,#ffd700,#ff8c00,#ffd700,#ff6000) border-box;box-shadow:0 0 20px rgba(255,160,0,.15),0 4px 20px rgba(0,0,0,.4),inset 0 0 30px rgba(255,180,0,.05);transition:all .2s;}
.bonus-bar::before{content:'';position:absolute;inset:0;border-radius:inherit;background:radial-gradient(ellipse 60% 80% at 15% 50%,rgba(255,200,0,.18) 0%,transparent 60%),radial-gradient(ellipse 40% 60% at 85% 50%,rgba(255,140,0,.08) 0%,transparent 60%);pointer-events:none;}
.bonus-bar:active{transform:scale(.99);}
.bonus-bar.got{opacity:.5;cursor:default;}
.bonus-icon{font-size:36px;position:relative;z-index:1;filter:drop-shadow(0 0 10px rgba(255,200,0,.8));animation:bonusPulse 2s ease-in-out infinite alternate;}
@keyframes bonusPulse{0%{transform:scale(1);}100%{transform:scale(1.08);filter:drop-shadow(0 0 18px rgba(255,200,0,1));}}
.bonus-info{flex:1;position:relative;z-index:1;}
.bonus-title{font-size:13px;font-weight:700;color:var(--gold);text-shadow:0 0 8px rgba(255,200,0,.5);}
.bonus-sub{font-size:11px;color:rgba(255,200,100,.7);margin-top:2px;}
.bonus-badge{background:linear-gradient(135deg,#ff9f00,#ff5500);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;box-shadow:0 0 12px rgba(255,150,0,.5);white-space:nowrap;position:relative;z-index:1;}
.bonus-badge.done{background:rgba(255,255,255,.1);color:rgba(255,255,255,.4);box-shadow:none;}
@keyframes sg-scan{0%{left:-60%}100%{left:120%}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
.sg-bar{display:flex;align-items:center;justify-content:center;height:38px;overflow:hidden;position:relative;background:linear-gradient(90deg,rgba(6,10,30,.95),rgba(10,16,42,.98),rgba(6,10,30,.95));border-bottom:1px solid rgba(34,211,238,.14);border-top:1px solid rgba(34,211,238,.06);margin:10px 0 0;}
.sg-sweep{position:absolute;top:0;bottom:0;width:60px;background:linear-gradient(90deg,transparent,rgba(103,232,249,.2),transparent);animation:sg-scan 3.5s ease-in-out infinite;pointer-events:none;}
.sg-text{color:#67e8f9;font-weight:700;letter-spacing:7px;font-size:11px;background:linear-gradient(90deg,#67e8f9,#a5f3fc,#67e8f9);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 3.5s linear infinite;position:relative;z-index:2;user-select:none;}
.sg-menu-btn{position:absolute;right:12px;background:rgba(34,211,238,.08);border:1px solid rgba(34,211,238,.22);border-radius:5px;width:26px;height:26px;color:#67e8f9;font-size:13px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;}
@keyframes glow-b{0%,100%{box-shadow:0 0 14px #3b82f6,0 0 35px #1d4ed844}50%{box-shadow:0 0 26px #60a5fa,0 0 65px #3b82f677}}
@keyframes glow-g{0%,100%{box-shadow:0 0 14px #22c55e,0 0 35px #15803d44}50%{box-shadow:0 0 26px #4ade80,0 0 65px #22c55e77}}
@keyframes glow-p{0%,100%{box-shadow:0 0 14px #a855f7,0 0 35px #7e22ce44}50%{box-shadow:0 0 26px #c084fc,0 0 65px #a855f777}}
@keyframes cs-r{from{transform:translateX(40px);opacity:0}to{transform:none;opacity:1}}
@keyframes cs-l{from{transform:translateX(-40px);opacity:0}to{transform:none;opacity:1}}
.cs-section{height:270px;position:relative;display:flex;flex-direction:column;}
.cs-stage{flex:1;min-height:0;position:relative;display:flex;}
.cs-card{width:100%;height:100%;cursor:pointer;display:flex;flex-direction:column;overflow:hidden;transition:filter .15s;-webkit-tap-highlight-color:transparent;}
.cs-card:active{filter:brightness(.88);}
.cs-card.blue {border-top:2px solid #3b82f6;border-bottom:2px solid #3b82f6;animation:glow-b 3s ease-in-out infinite;}
.cs-card.green{border-top:2px solid #22c55e;border-bottom:2px solid #22c55e;animation:glow-g 3s ease-in-out infinite;}
.cs-card.purple{border-top:2px solid #a855f7;border-bottom:2px solid #a855f7;animation:glow-p 3s ease-in-out infinite;}
.cs-r{animation:cs-r .22s ease-out!important;}
.cs-l{animation:cs-l .22s ease-out!important;}
.cs-img{flex:1;min-height:0;overflow:hidden;position:relative;}
.cs-img img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;}
.cs-img::after{content:'';position:absolute;bottom:0;left:0;right:0;height:32%;background:linear-gradient(transparent,rgba(0,0,0,.85));}
.cs-foot{flex-shrink:0;padding:9px 14px 10px;}
.cs-foot.blue  {background:rgba(4,8,36,.97);border-top:1px solid rgba(59,130,246,.25);}
.cs-foot.green {background:rgba(3,10,5,.97); border-top:1px solid rgba(34,197,94,.25);}
.cs-foot.purple{background:rgba(8,3,20,.97); border-top:1px solid rgba(168,85,247,.25);}
.cs-row{display:flex;align-items:center;gap:8px;margin-bottom:3px;flex-wrap:wrap;}
.cs-title{font-weight:900;font-size:14px;letter-spacing:.2px;white-space:nowrap;}
.cs-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px;white-space:nowrap;}
.cs-desc{font-size:10px;color:rgba(175,200,230,.62);line-height:1.5;}
.cs-nav{position:absolute;top:50%;transform:translateY(-50%);z-index:20;width:34px;height:34px;border-radius:50%;background:rgba(8,14,40,.92);border:1px solid rgba(99,155,255,.28);color:#93c5fd;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;box-shadow:0 0 10px rgba(0,0,0,.5);outline:none;-webkit-tap-highlight-color:transparent;}
.cs-nav:active{transform:translateY(-50%) scale(.88);}
.cs-nav-l{left:6px;}
.cs-nav-r{right:6px;}
.cs-nav.off{opacity:.15;pointer-events:none;}
.cs-dots{display:flex;justify-content:center;gap:7px;padding:7px 0 5px;flex-shrink:0;}
.cs-dot{height:6px;border-radius:3px;cursor:pointer;transition:all .3s;background:rgba(148,163,184,.22);-webkit-tap-highlight-color:transparent;}
.ranking-section{margin:16px 12px 0;}
.ranking-title{text-align:center;padding:16px 20px;margin-bottom:12px;position:relative;font-family:'Russo One',sans-serif;font-size:15px;color:var(--gold);letter-spacing:.2em;text-shadow:0 0 15px rgba(255,200,0,.8),0 0 30px rgba(255,150,0,.4);background:linear-gradient(135deg,rgba(30,20,5,.9),rgba(20,10,0,.95));border-radius:12px;border:2px solid rgba(255,180,0,.3);box-shadow:0 0 25px rgba(255,160,0,.15),inset 0 0 20px rgba(255,140,0,.05);overflow:hidden;}
.ranking-title::before{content:'';position:absolute;top:4px;left:8px;right:8px;height:6px;background:repeating-linear-gradient(90deg,rgba(255,220,0,.7) 0px,rgba(255,220,0,.7) 5px,transparent 5px,transparent 14px);border-radius:3px;filter:blur(.5px);box-shadow:0 0 6px rgba(255,220,0,.5);}
.ranking-title::after{content:'';position:absolute;bottom:4px;left:8px;right:8px;height:6px;background:repeating-linear-gradient(90deg,rgba(255,200,0,.6) 0px,rgba(255,200,0,.6) 5px,transparent 5px,transparent 14px);border-radius:3px;filter:blur(.5px);box-shadow:0 0 6px rgba(255,200,0,.4);}
.ranking-title span{position:relative;z-index:1;}
.ranking-title span::before{content:'🏆 ';}
.rank-block{background:rgba(8,12,35,.7);border-radius:14px;margin-bottom:10px;overflow:hidden;border:1px solid rgba(255,255,255,.06);backdrop-filter:blur(8px);}
.rank-block-title{padding:10px 14px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px;border-bottom:1px solid rgba(255,255,255,.05);background:rgba(255,255,255,.02);}
.rank-list{padding:4px 0;min-height:36px;}
.rank-item{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid rgba(255,255,255,.04);}
.rank-item:last-child{border-bottom:none;}
.rank-pos{font-family:'Zen Dots',monospace;font-size:13px;min-width:28px;text-align:center;}
.rank-pos.p1{color:#ffd700;text-shadow:0 0 8px rgba(255,215,0,.6);}
.rank-pos.p2{color:#c0c0c0;}
.rank-pos.p3{color:#cd7f32;}
.rank-pos.pn{color:rgba(255,255,255,.3);font-size:11px;}
.rank-name{flex:1;font-size:13px;font-weight:700;color:rgba(220,230,255,.9);}
.rank-score{font-family:'Zen Dots',monospace;font-size:13px;color:#39ff14;text-shadow:0 0 8px rgba(57,255,20,.4);}
.rank-empty{padding:14px;text-align:center;color:rgba(255,255,255,.2);font-size:12px;}
.rank-loading{padding:12px;text-align:center;color:rgba(255,255,255,.3);font-size:11px;}
.foot{padding:20px 12px 10px;text-align:center;font-size:10px;color:rgba(255,255,255,.1);}
.foot a{color:rgba(255,255,255,.15);text-decoration:none;}
.toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:rgba(0,200,100,.9);color:#fff;font-size:13px;padding:10px 20px;border-radius:20px;opacity:0;transition:opacity .3s;z-index:9999;backdrop-filter:blur(8px);white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div id="lobby">
  <div class="hdr">
    <div class="avatar" id="avatar">?</div>
    <div class="hdr-info">
      <div class="hdr-name" id="uname">--</div>
      <div class="hdr-medals" id="mc">00000</div>
    </div>
    <button class="lout" onclick="doLogout()">ログアウト</button>
  </div>
  <div class="bonus-bar" id="bonusBar" onclick="claimBonus()">
    <div class="bonus-icon">💰</div>
    <div class="bonus-info">
      <div class="bonus-title">デイリーボーナス</div>
      <div class="bonus-sub" id="bonusSub">タップして50枚もらおう！</div>
    </div>
    <div class="bonus-badge" id="bonusBadge">受取る</div>
  </div>
  <div class="sg-bar">
    <div class="sg-sweep"></div>
    <span class="sg-text">SELECT GAME</span>
    <button class="sg-menu-btn">≡</button>
  </div>
  <div class="cs-section">
    <div class="cs-stage">
      <button class="cs-nav cs-nav-l off" id="cs-nav-l" onclick="csMove(-1)">&#8592;</button>
      <div id="cs-slot" style="width:100%;height:100%;"></div>
      <button class="cs-nav cs-nav-r" id="cs-nav-r" onclick="csMove(1)">&#8594;</button>
    </div>
    <div class="cs-dots" id="cs-dots">
      <div class="cs-dot" onclick="csGoTo(0)"></div>
      <div class="cs-dot" onclick="csGoTo(1)"></div>
      <div class="cs-dot" onclick="csGoTo(2)"></div>
    </div>
  </div>
  <div class="ranking-section" id="rankingSection">
    <div class="ranking-title"><span>ゲーム別ランキング</span></div>
    <div class="rank-block">
      <div class="rank-block-title">🧙 クイズ FEVER ソロ <span style="font-size:10px;color:rgba(150,180,255,.5);margin-left:4px">正解数ハイスコア</span></div>
      <div class="rank-list" id="rank-quiz-solo"><div class="rank-loading">読み込み中...</div></div>
    </div>
    <div class="rank-block">
      <div class="rank-block-title">🤖 クイズ FEVER CPU対戦 <span style="font-size:10px;color:rgba(150,180,255,.5);margin-left:4px">正解数ハイスコア</span></div>
      <div class="rank-list" id="rank-quiz-battle"><div class="rank-loading">読み込み中...</div></div>
    </div>
    <div class="rank-block">
      <div class="rank-block-title">🎴 ポーカー FEVER <span style="font-size:10px;color:rgba(150,180,255,.5);margin-left:4px">獲得メダルハイスコア</span></div>
      <div class="rank-list" id="rank-poker"><div class="rank-loading">読み込み中...</div></div>
    </div>
    <div class="rank-block">
      <div class="rank-block-title">✊ グーチョキパー FEVER <span style="font-size:10px;color:rgba(150,180,255,.5);margin-left:4px">獲得メダルハイスコア</span></div>
      <div class="rank-list" id="rank-janken"><div class="rank-loading">読み込み中...</div></div>
    </div>
  </div>
  <div class="foot">© 2025 百式ゲーム王国・メダルはゲーム間で共通<br><a href="admin.html">⚙ 管理</a></div>
</div>
<div class="toast" id="toast"></div>
<script>
var GAMES=[
  {color:'blue',tc:'#60a5fa',bbg:'rgba(59,130,246,.18)',bbr:'rgba(59,130,246,.4)',bct:'#93c5fd',
   title:'クイズ魔道学院FEVER',badge:'早押し / ランキング対戦',
   desc:'キーワード検索で問題を無限生成\u3000最強CPUと早押し対決！',
   img:'quiz_fever_banner.jpg',url:'quiz_fever.html'},
  {color:'green',tc:'#4ade80',bbg:'rgba(34,197,94,.18)',bbr:'rgba(34,197,94,.4)',bct:'#86efac',
   title:'ポーカーFEVER',badge:"7\'s WILD PLUS",
   desc:'メダルを賭けてポーカー勝負！役を揃えて大量獲得を狙え！',
   img:'poker_fever_banner.jpg',url:'poker_fever.html'},
  {color:'purple',tc:'#c084fc',bbg:'rgba(168,85,247,.18)',bbr:'rgba(168,85,247,.4)',bct:'#d8b4fe',
   title:'グーチョキパーFEVER',badge:'JANKEN BATTLE',
   desc:'早押しバトル！逆転ボーナス突入！メダルを増やせ！',
   img:'janken_fever_banner.jpg',url:'janken-fever.html'}
];
var csCur=0,csBusy=false,csTx=null;
function csRender(dir){
  var g=GAMES[csCur];
  var anim=dir===1?'cs-r':dir===-1?'cs-l':'';
  var dc={blue:'#3b82f6',green:'#22c55e',purple:'#a855f7'}[g.color];
  document.getElementById('cs-slot').innerHTML=
    '<div class="cs-card '+g.color+' '+anim+'" onclick="goGame(\''+g.url+'\')">'
    +'<div class="cs-img"><img src="'+g.img+'" loading="eager" alt="'+g.title+'"></div>'
    +'<div class="cs-foot '+g.color+'">'
    +'<div class="cs-row">'
    +'<span class="cs-title" style="color:'+g.tc+';text-shadow:0 0 10px '+g.tc+'88">'+g.title+'</span>'
    +'<span class="cs-badge" style="background:'+g.bbg+';border:1px solid '+g.bbr+';color:'+g.bct+'">'+g.badge+'</span>'
    +'</div>'
    +'<div class="cs-desc">'+g.desc+'</div>'
    +'</div></div>';
  document.querySelectorAll('.cs-dot').forEach(function(d,i){
    d.style.width=i===csCur?'20px':'7px';
    d.style.background=i===csCur?dc:'rgba(148,163,184,.22)';
    d.style.boxShadow=i===csCur?'0 0 6px '+dc:'none';
  });
  document.getElementById('cs-nav-l').classList.remove('off');
  document.getElementById('cs-nav-r').classList.remove('off');
}
function csMove(dir){
  if(csBusy)return;
  var nx=csCur+dir; if(nx<0)nx=GAMES.length-1; if(nx>=GAMES.length)nx=0;
  csBusy=true;csCur=nx;csRender(dir);
  setTimeout(function(){csBusy=false;},240);
}
function csGoTo(i){
  if(i===csCur||csBusy)return;
  var d=i>csCur?1:-1;csCur=i;csRender(d);
}
function goGame(url){save();location.href=url;}
(function(){
  var s=document.getElementById('stars');
  for(var i=0;i<60;i++){var el=document.createElement('span');var sz=Math.random()*2.5+.5;el.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;--d:'+(2+Math.random()*4)+'s;animation-delay:'+Math.random()*4+'s;opacity:'+(0.2+Math.random()*0.6);s.appendChild(el);}
})();
var user=null;
(function(){
  try{var s=JSON.parse(localStorage.getItem('hkg_user')||'null');if(!s||!s.name){location.replace('index.html');return;}user=s;}
  catch(e){location.replace('index.html');return;}
})();
if(user){
  document.getElementById('lobby').style.display='block';
  var n=user.name||'?';
  document.getElementById('uname').textContent=n;
  document.getElementById('avatar').textContent=n==='GUEST'?'G':(n.charAt(0)||'?');
  document.getElementById('mc').textContent=String(user.medals||0).padStart(5,'0');
  csRender(0);
  document.getElementById('cs-slot').addEventListener('touchstart',function(e){csTx=e.touches[0].clientX;},{passive:true});
  document.getElementById('cs-slot').addEventListener('touchend',function(e){if(csTx===null)return;var dx=csTx-e.changedTouches[0].clientX;if(Math.abs(dx)>35)csMove(dx>0?1:-1);csTx=null;},{passive:true});
  try{loadRankings();}catch(e){}
  try{checkBonus();}catch(e){}
}
window.addEventListener('pageshow',function(){
  try{var s=JSON.parse(localStorage.getItem('hkg_user')||'null');if(s&&user&&s.name===user.name){user=s;document.getElementById('mc').textContent=String(user.medals||0).padStart(5,'0');}}catch(e){}
});
var SBU='https://gtzfcoiowdnyjvwikxku.supabase.co';
var SBK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd0emZjb2lvd2RueWp2d2lreGt1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1ODk3MTksImV4cCI6MjA5MDE2NTcxOX0.aET6tP6-JUyRuwFOrPa-xn0RofVX4o3gRCPBm13Dbvg';
var SBH={'apikey':SBK,'Authorization':'Bearer '+SBK};
function loadRankings(){
  var medals=['🥇','🥈','🥉'],pc=['p1','p2','p3'];
  function best(d,nk,sk){var b={};(d||[]).forEach(function(r){var nm=r[nk]||'?',v=r[sk]||0;if(!b[nm]||v>b[nm])b[nm]=v;});return Object.entries(b).map(function(e){return{name:e[0],score:e[1]};}).sort(function(a,b){return b.score-a.score;});}
  function render(id,rows,label){var el=document.getElementById(id);if(!el)return;if(!rows||!rows.length){el.innerHTML='<div class="rank-empty">まだ記録がありません</div>';return;}el.innerHTML=rows.slice(0,10).map(function(r,i){return'<div class="rank-item"><span class="rank-pos '+(i<3?pc[i]:'pn')+'">'+(i<3?medals[i]:(i+1))+'</span><span class="rank-name">'+String(r.name).slice(0,10)+'</span><span class="rank-score">'+r.score.toLocaleString()+label+'</span></div>';}).join('');}
  function noData(id){var el=document.getElementById(id);if(el)el.innerHTML='<div class="rank-empty">まだ記録がありません</div>';}
  fetch(SBU+'/rest/v1/quiz_fever_scores?select=player_name,score&mode=eq.solo&order=score.desc&limit=20',{headers:SBH}).then(function(r){return r.json();}).then(function(d){render('rank-quiz-solo',best(d,'player_name','score'),'問');}).catch(function(){noData('rank-quiz-solo');});
  fetch(SBU+'/rest/v1/quiz_fever_scores?select=player_name,score&mode=eq.battle&order=score.desc&limit=20',{headers:SBH}).then(function(r){return r.json();}).then(function(d){render('rank-quiz-battle',best(d,'player_name','score'),'問');}).catch(function(){noData('rank-quiz-battle');});
  fetch(SBU+'/rest/v1/poker_scores?select=player_name,medal_won&limit=500',{headers:SBH}).then(function(r){return r.json();}).then(function(d){render('rank-poker',best(d,'player_name','medal_won'),'枚');}).catch(function(){noData('rank-poker');});
  fetch(SBU+'/rest/v1/rankings?select=name,score&game=eq.janken&limit=500',{headers:SBH}).then(function(r){return r.json();}).then(function(d){render('rank-janken',best(d,'name','score'),'枚');}).catch(function(){noData('rank-janken');});
}
function checkBonus(){var today=new Date().toDateString();var bar=document.getElementById('bonusBar');var badge=document.getElementById('bonusBadge');var sub=document.getElementById('bonusSub');if(localStorage.getItem('hkg_daily_bonus')===today){bar.classList.add('got');badge.classList.add('done');badge.textContent='受取済';sub.textContent='また明日来てね！';}else{bar.classList.remove('got');badge.classList.remove('done');badge.textContent='+50枚';sub.textContent='タップして50枚もらおう！';}}
function claimBonus(){var today=new Date().toDateString();if(localStorage.getItem('hkg_daily_bonus')===today){toast('今日はもう受け取り済みです！');return;}user.medals=(user.medals||0)+50;save();localStorage.setItem('hkg_daily_bonus',today);document.getElementById('mc').textContent=String(user.medals).padStart(5,'0');checkBonus();toast('🎁 デイリーボーナス +50枚！');}
function getDB(){try{return JSON.parse(localStorage.getItem('hkg_db')||'{}');}catch(e){return{};}}
function saveDB(db){try{localStorage.setItem('hkg_db',JSON.stringify(db));}catch(e){}}
function save(){try{localStorage.setItem('hkg_user',JSON.stringify(user));}catch(e){}if(user&&user.name&&user.name!=='GUEST'){var db=getDB();if(db[user.name])db[user.name].medals=user.medals;saveDB(db);}}
var _tt;function toast(m){clearTimeout(_tt);var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');_tt=setTimeout(function(){t.classList.remove('show');},2500);}
async function doLogout(){var u=JSON.parse(localStorage.getItem('hkg_user')||'{}');if(u.name&&u.name!=='GUEST'&&u.medals!==undefined){var headers={'apikey':SBK,'Authorization':'Bearer '+SBK,'Content-Type':'application/json'};try{if(u.id){await fetch(SBU+'/rest/v1/game_users?id=eq.'+u.id,{method:'PATCH',headers,body:JSON.stringify({medals:u.medals})});}else{var rows=await fetch(SBU+'/rest/v1/game_users?name=eq.'+encodeURIComponent(u.name),{headers}).then(function(r){return r.json();});if(rows&&rows[0])await fetch(SBU+'/rest/v1/game_users?id=eq.'+rows[0].id,{method:'PATCH',headers,body:JSON.stringify({medals:u.medals})});}}catch(e){}}localStorage.removeItem('hkg_user');location.replace('index.html');}
</script>
